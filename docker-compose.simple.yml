# =============================================================================
# Docker Compose for VPS Deployment with PostgreSQL
# =============================================================================
# Migrated from SQLite to PostgreSQL for better concurrency
#
# Usage:
#   docker-compose -f docker-compose.simple.yml up -d
#
# =============================================================================

services:
  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: trader_postgres
    restart: unless-stopped

    environment:
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=trader_secure_pwd_2024
      - POSTGRES_DB=trader_db

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader_db"]
      interval: 10s
      timeout: 5s
      retries: 5

    # Not exposed externally for security
    expose:
      - "5432"

  # =============================================================================
  # Trading Application (Backend + Frontend)
  # =============================================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: trader_bitcoin:${IMAGE_TAG:-latest}
    container_name: trader_app
    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    # JSON log driver for easy debugging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    environment:
      # Database: PostgreSQL
      - DATABASE_URL=postgresql+asyncpg://trader:trader_secure_pwd_2024@postgres:5432/trader_db

      # Application settings
      - DEBUG=false
      - SQL_DEBUG=false

      # Trading configuration (from .env file)
      - HYPERLIQUID_PRIVATE_KEY=${HYPERLIQUID_PRIVATE_KEY}
      - HYPERLIQUID_WALLET_ADDRESS=${HYPERLIQUID_WALLET_ADDRESS}
      - HYPERLIQUID_TESTNET=${HYPERLIQUID_TESTNET:-false}

      # AI configuration (from .env file)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}

      # Sync configuration (optimized for 24/7 trading)
      - SYNC_INTERVAL_SECONDS=60
      - AI_DECISION_INTERVAL=180

      # Connection pool (optimized for PostgreSQL)
      - DB_POOL_SIZE=10
      - DB_MAX_OVERFLOW=5

    ports:
      - "5611:5611"

    volumes:
      # Keep app_data for other files (logs, cache, etc.)
      - app_data:/app/data

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5611/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

    mem_limit: 512m
    memswap_limit: 512m

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
    name: trader_postgres_data
  app_data:
    driver: local
    name: trader_app_data
