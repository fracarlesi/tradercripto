# Simple Trading Bot Configuration
# ================================

# Trading symbol (one at a time for simplicity)
symbol: "ETH"

# Strategy: momentum, mean_reversion, or breakout
strategy: "momentum"

# Position sizing
leverage: 5
position_size_usd: 100

# Take Profit / Stop Loss / Trailing Stop (as percentage)
tp_pct: 0.005           # 0.5% take profit
sl_pct: 0.003           # 0.3% stop loss
trailing_stop_pct: 0.005  # 0.5% trailing stop (activates after breakeven)

# Trading parameters
min_order_interval_seconds: 60   # Minimum time between orders
max_positions: 1                 # Maximum concurrent positions

# Strategy-specific parameters
momentum:
  ema_fast: 20
  ema_slow: 50
  rsi_period: 14
  rsi_long_threshold: 55   # RSI > this to go long
  rsi_short_threshold: 45  # RSI < this to go short

mean_reversion:
  rsi_period: 14
  rsi_oversold: 30    # RSI < this to go long
  rsi_overbought: 70  # RSI > this to go short
  bb_period: 20       # Bollinger Bands period
  bb_std: 2.0         # Bollinger Bands std dev

breakout:
  lookback_bars: 20   # Number of bars for high/low
  min_breakout_pct: 0.002  # Minimum 0.2% breakout
  volatility_multiplier: 1.5  # ATR surge threshold (current ATR > avg ATR * multiplier)

# Logging
log_level: "INFO"
log_file: "simple_bot/bot.log"

# API settings (read from .env, these are fallbacks)
testnet: true
