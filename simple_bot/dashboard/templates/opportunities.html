{% extends "base.html" %}

{% block title %}Opportunities - HLQuantBot v3.0{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-white mb-2">Trading Opportunities</h1>
    <p class="text-gray-400 text-sm">Top 20 ranked opportunities from OpportunityRanker</p>
</div>

<!-- Opportunities Content (loaded via HTMX) -->
<div id="opportunities-content"
     hx-get="/partials/opportunities"
     hx-trigger="load, every 10s"
     hx-swap="innerHTML">
    <div class="loading">
        <span class="spinner mr-2"></span> Loading opportunities...
    </div>
</div>
{% endblock %}
