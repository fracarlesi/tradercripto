{% extends "base.html" %}

{% block title %}Services - HLQuantBot v2.0{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-white mb-2">Service Status</h1>
    <p class="text-gray-400 text-sm">Health monitoring for all microservices</p>
</div>

<!-- Services Content (loaded via HTMX) -->
<div id="services-content"
     hx-get="/partials/services"
     hx-trigger="load, every 5s"
     hx-swap="innerHTML">
    <div class="loading">
        <span class="spinner mr-2"></span> Loading services...
    </div>
</div>
{% endblock %}
