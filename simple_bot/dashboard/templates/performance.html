{% extends "base.html" %}

{% block title %}Performance - HLQuantBot v3.0{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-white mb-2">Performance Analytics</h1>
    <p class="text-gray-400 text-sm">Trading performance metrics and trade history</p>
</div>

<!-- Performance Content (loaded via HTMX) -->
<div id="performance-content"
     hx-get="/partials/performance"
     hx-trigger="load, every 30s"
     hx-swap="innerHTML">
    <div class="loading">
        <span class="spinner mr-2"></span> Loading performance data...
    </div>
</div>
{% endblock %}
