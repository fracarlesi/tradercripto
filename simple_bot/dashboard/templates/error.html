{% extends "base.html" %}

{% block title %}Error {{ code }} - HLQuantBot v2.0{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="text-center">
        <div class="text-8xl font-bold text-gray-700 mb-4">{{ code }}</div>
        <h1 class="text-2xl font-bold text-white mb-4">{{ error }}</h1>
        <p class="text-gray-400 mb-8">Something went wrong. Please try again.</p>
        <a href="/"
           class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition">
            <span>&#8592;</span> Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
