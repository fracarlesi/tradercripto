<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}HLQuantBot v2.0{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/htmx.org@2.0.2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'bg-body': '#0f1419',
                        'bg-card': '#1a1f2e',
                        'bg-card-hover': '#242b3d',
                        'bg-dark': '#0a0d12',
                        'border-subtle': '#2d3748',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg-body: #0f1419;
            --bg-card: #1a1f2e;
            --bg-card-hover: #242b3d;
            --bg-dark: #0a0d12;
            --border-subtle: #2d3748;
            --accent: #3b82f6;
            --accent-soft: rgba(59, 130, 246, 0.15);
            --text-main: #e5e7eb;
            --text-muted: #9ca3af;
            --text-bright: #ffffff;
            --success: #10b981;
            --success-soft: rgba(16, 185, 129, 0.15);
            --danger: #ef4444;
            --danger-soft: rgba(239, 68, 68, 0.15);
            --warning: #f59e0b;
            --warning-soft: rgba(245, 158, 11, 0.15);
            --purple: #8b5cf6;
            --purple-soft: rgba(139, 92, 246, 0.15);
            --cyan: #06b6d4;
            --cyan-soft: rgba(6, 182, 212, 0.15);
            --orange: #f97316;
            --orange-soft: rgba(249, 115, 22, 0.15);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg-body);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* Status dot animation */
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        .status-dot.online { background: var(--success); }
        .status-dot.offline { background: var(--danger); }
        .status-dot.warning { background: var(--warning); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Card styles */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-bright);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body {
            padding: 1rem;
        }

        /* Tag styles */
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }
        .tag-success { background: var(--success-soft); color: var(--success); }
        .tag-danger { background: var(--danger-soft); color: var(--danger); }
        .tag-warning { background: var(--warning-soft); color: var(--warning); }
        .tag-info { background: var(--accent-soft); color: var(--accent); }
        .tag-purple { background: var(--purple-soft); color: var(--purple); }
        .tag-cyan { background: var(--cyan-soft); color: var(--cyan); }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.75rem;
        }

        .stat-card {
            background: var(--bg-dark);
            border-radius: 8px;
            padding: 0.75rem;
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-bright);
        }

        .stat-value.positive { color: var(--success); }
        .stat-value.negative { color: var(--danger); }

        /* Table styles */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
        }

        th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border-subtle);
            background: rgba(0, 0, 0, 0.2);
        }

        td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        tr:hover td {
            background: var(--bg-card-hover);
        }

        /* Positive/negative text colors */
        .positive { color: var(--success) !important; }
        .negative { color: var(--danger) !important; }

        /* Loading spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border-subtle);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-body); }
        ::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a5568; }

        /* Navigation active state */
        .nav-link.active {
            background: var(--accent-soft);
            color: var(--accent);
            border-left: 3px solid var(--accent);
        }

        /* HTMX loading indicator */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-flex;
        }
        .htmx-request.htmx-indicator {
            display: inline-flex;
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="bg-gradient-to-r from-gray-800 to-gray-900 border-b border-gray-700 px-6 py-3 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-gradient-to-br from-blue-500 to-purple-600 rounded-md flex items-center justify-center text-xs font-bold text-white">HL</div>
                <span class="text-lg font-bold text-white">QuantBot v2.0</span>
            </div>
            <span class="px-2 py-0.5 rounded-full text-xs font-semibold uppercase tracking-wide
                {% if environment == 'TESTNET' %}
                    bg-yellow-500/20 text-yellow-400 border border-yellow-500
                {% else %}
                    bg-red-500/20 text-red-400 border border-red-500
                {% endif %}">
                {{ environment }}
            </span>
        </div>
        <div class="flex items-center gap-3">
            <div id="bot-status"
                 class="flex items-center gap-2 px-3 py-1.5 bg-gray-800 rounded-md text-sm"
                 hx-get="/api/bot-status"
                 hx-trigger="load, every 5s"
                 hx-swap="innerHTML">
                <span class="spinner"></span> Loading...
            </div>
            <button onclick="window.location.reload()"
                    class="px-3 py-1.5 text-sm text-gray-400 border border-gray-600 rounded-md hover:bg-gray-700 hover:text-white transition">
                Refresh
            </button>
        </div>
    </header>

    <!-- Main Container -->
    <div class="flex min-h-[calc(100vh-52px)]">
        <!-- Sidebar Navigation -->
        <nav class="w-56 bg-gray-900/50 border-r border-gray-700 p-4 flex-shrink-0">
            <div class="mb-6">
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 px-3">Overview</div>
                <a href="/" class="nav-link flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-md transition {% if page == 'overview' %}active{% endif %}">
                    <span class="text-base">&#128200;</span>
                    <span class="text-sm">Dashboard</span>
                </a>
                <a href="/market-state" class="nav-link flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-md transition {% if page == 'market_state' %}active{% endif %}">
                    <span class="text-base">&#128202;</span>
                    <span class="text-sm">Market State</span>
                </a>
            </div>

            <div class="mb-6">
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 px-3">Trading</div>
                <a href="/positions" class="nav-link flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-md transition {% if page == 'positions' %}active{% endif %}">
                    <span class="text-base">&#128179;</span>
                    <span class="text-sm">Active Trades</span>
                </a>
                <a href="/trade-history" class="nav-link flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-md transition {% if page == 'trade_history' %}active{% endif %}">
                    <span class="text-base">&#128195;</span>
                    <span class="text-sm">Trade History</span>
                </a>
            </div>

            <div class="mb-6">
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 px-3">Risk</div>
                <a href="/risk-monitor" class="nav-link flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-md transition {% if page == 'risk_monitor' %}active{% endif %}">
                    <span class="text-base">&#128680;</span>
                    <span class="text-sm">Risk Monitor</span>
                </a>
                <a href="/llm-decisions" class="nav-link flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-md transition {% if page == 'llm_decisions' %}active{% endif %}">
                    <span class="text-base">&#129302;</span>
                    <span class="text-sm">LLM Decisions</span>
                </a>
            </div>

            <div class="mb-6">
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 px-3">System</div>
                <a href="/services" class="nav-link flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-md transition {% if page == 'services' %}active{% endif %}">
                    <span class="text-base">&#9889;</span>
                    <span class="text-sm">Services</span>
                </a>
                <a href="/performance" class="nav-link flex items-center gap-3 px-3 py-2 text-gray-400 hover:bg-gray-800 hover:text-white rounded-md transition {% if page == 'performance' %}active{% endif %}">
                    <span class="text-base">&#128176;</span>
                    <span class="text-sm">Performance</span>
                </a>
            </div>

            <!-- Version info at bottom -->
            <div class="mt-auto pt-4 border-t border-gray-700">
                <div class="text-xs text-gray-500 px-3">
                    <div>Version {{ version }}</div>
                    <div class="mt-1">{{ now.strftime("%Y-%m-%d %H:%M") }}</div>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="flex-1 p-6 overflow-y-auto max-h-[calc(100vh-52px)]">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        // Number formatting utilities
        function formatNumber(num, decimals = 2) {
            if (num === null || num === undefined) return '-';
            return new Intl.NumberFormat('en-US', {
                minimumFractionDigits: decimals,
                maximumFractionDigits: decimals
            }).format(num);
        }

        function formatCurrency(num) {
            if (num === null || num === undefined) return '-';
            const prefix = num >= 0 ? '+$' : '-$';
            return prefix + formatNumber(Math.abs(num));
        }

        function formatPercent(num) {
            if (num === null || num === undefined) return '-';
            const prefix = num >= 0 ? '+' : '';
            return prefix + formatNumber(num) + '%';
        }
    </script>
</body>
</html>
