{% extends "base.html" %}

{% block title %}Dashboard - HLQuantBot v2.0{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-white mb-2">Dashboard Overview</h1>
    <p class="text-gray-400 text-sm">Real-time system status and key metrics</p>
</div>

<!-- Overview Content (loaded via HTMX) -->
<div id="overview-content"
     hx-get="/partials/overview"
     hx-trigger="load, every 10s"
     hx-swap="innerHTML">
    <div class="loading">
        <span class="spinner mr-2"></span> Loading overview...
    </div>
</div>
{% endblock %}
