{% extends "base.html" %}

{% block title %}Signals - HLQuantBot v2.0{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-white mb-2">Strategy Signals</h1>
    <p class="text-gray-400 text-sm">Recent strategy decisions and signal history</p>
</div>

<!-- Signals Content (loaded via HTMX) -->
<div id="signals-content"
     hx-get="/partials/signals"
     hx-trigger="load, every 10s"
     hx-swap="innerHTML">
    <div class="loading">
        <span class="spinner mr-2"></span> Loading signals...
    </div>
</div>
{% endblock %}
