# =============================================================================
# HLQuantBot v3.0 - Momentum Scalper Configuration
# =============================================================================
# Strategy: EMA9/EMA21 crossover on 15m with RSI filter
# Target: Aggressive growth on small account ($86 USDC)
# Risk: Fixed TP/SL (0.8%/0.4%), 10x leverage, LONG+SHORT
# =============================================================================

# -----------------------------------------------------------------------------
# Universe
# -----------------------------------------------------------------------------
universe:
  mode: "all"

  min_volume_24h: 100000
  min_market_cap: 0

  exclude_symbols:
    # Stablecoins
    - "USDC"
    - "USDT"
    - "DAI"
    - "USDM"
    - "FDUSD"
    - "TUSD"
    # Delisted / migrated tokens (generate "Insufficient data" warnings)
    - "MATIC"
    - "RNDR"
    - "FTM"
    - "MKR"
    - "FXS"
    - "HPOS"
    - "RLB"
    - "UNIBOT"
    - "OX"
    - "FRIEND"
    - "SHIA"
    - "CYBER"
    - "BLZ"
    - "LOOM"
    - "OGN"
    - "RDNT"
    - "BNT"
    - "CANTO"
    - "REQ"
    - "ORBS"
    - "STG"
    - "STRAX"
    - "BADGER"
    - "ILV"
    - "NFTI"
    - "NTRN"
    - "PANDORA"
    - "PIXEL"
    - "AI"
    - "MYRO"
    - "OMNI"
    - "LISTA"
    - "kDOGS"
    - "CATI"
    - "NEIROETH"
    - "AI16Z"
    - "JELLY"
    - "LAUNCHCOIN"

  assets:
    - symbol: "BTC"
      enabled: true
      min_notional: 10
      max_notional: 50000
    - symbol: "ETH"
      enabled: true
      min_notional: 10
      max_notional: 50000
    - symbol: "SOL"
      enabled: true
      min_notional: 10
      max_notional: 50000

# -----------------------------------------------------------------------------
# Timeframes
# -----------------------------------------------------------------------------
timeframes:
  primary: "15m"
  bars_to_fetch: 200
  scan_interval_minutes: 5

# -----------------------------------------------------------------------------
# Risk Management
# -----------------------------------------------------------------------------
risk:
  per_trade_pct: 5.0
  max_per_trade_pct: 8.0

  max_positions: 3
  max_exposure_pct: 300
  max_position_pct: 70

  leverage: 10
  max_leverage: 20

  correlation_limit: 0.7
  max_daily_trades: 8

# -----------------------------------------------------------------------------
# Kill Switch
# -----------------------------------------------------------------------------
kill_switch:
  enabled: true

  daily_loss_pct: 8.0
  daily_loss_action: "pause_until_tomorrow"

  weekly_loss_pct: 15.0
  weekly_loss_action: "pause_3_days"

  max_drawdown_pct: 30.0
  max_drawdown_action: "stop_all"

  check_interval_seconds: 60

# -----------------------------------------------------------------------------
# Stops - Fixed TP/SL
# -----------------------------------------------------------------------------
stops:
  stop_loss_pct: 0.4
  take_profit_pct: 0.8
  use_server_side: true

  # ATR-based trailing (for reference, not primary)
  initial_atr_mult: 2.5
  trailing_atr_mult: 2.5
  trailing_update_interval: 300

  # Graduated ROI disabled - using fixed TP instead
  minimal_roi: {}

# -----------------------------------------------------------------------------
# Regime Detection
# -----------------------------------------------------------------------------
regime:
  trend_adx_min: 25
  range_adx_max: 20
  ema_slope_threshold: 0.0003
  choppiness_range_min: 60
  confirmation_bars: 2

# -----------------------------------------------------------------------------
# Strategies
# -----------------------------------------------------------------------------
strategies:
  trend_follow:
    enabled: false

  momentum_scalper:
    enabled: true
    allow_short: true
    min_atr_pct: 0.1
    rsi_long_min: 30
    rsi_long_max: 65
    rsi_short_min: 35
    rsi_short_max: 70

# -----------------------------------------------------------------------------
# LLM Veto - DeepSeek confirmation/veto
# -----------------------------------------------------------------------------
llm:
  enabled: true
  role: "veto_only"

  provider: "deepseek"
  model: "deepseek-chat"
  api_key_env: "DEEPSEEK_API_KEY"

  max_calls_per_day: 20
  timeout_seconds: 30

  fallback_on_error: "allow"
  fallback_on_chaos: "deny"

  min_confidence: 0.6

# -----------------------------------------------------------------------------
# Execution
# -----------------------------------------------------------------------------
execution:
  prefer_limit: true
  limit_timeout_seconds: 60

  max_slippage_pct: 0.1

  max_retries: 3
  retry_delay_seconds: 5

  place_stop_immediately: true

# -----------------------------------------------------------------------------
# Monitoring & Alerts
# -----------------------------------------------------------------------------
monitoring:
  equity_snapshot_interval: 300

  telegram:
    enabled: false

  whatsapp:
    enabled: true
    topic: ${NTFY_TOPIC:}
    server: "https://ntfy.sh"
    alert_on:
      - "trade_open"
      - "trade_close"
      - "kill_switch_trigger"
      - "error"

  log_level: "INFO"
  log_trades: true
  log_decisions: true

# -----------------------------------------------------------------------------
# Protections
# -----------------------------------------------------------------------------
protections:
  - name: "StoplossGuard"
    lookback_period_min: 60
    stoploss_limit: 3
    stop_duration_min: 360

  - name: "MaxDrawdown"
    lookback_period_min: 1440
    max_drawdown_pct: 8.0
    stop_duration_min: 720

  - name: "CooldownPeriod"
    cooldown_minutes: 3

  - name: "LowPerformance"
    min_trades: 20
    min_win_rate: 0.25
    stop_duration_min: 1440

# -----------------------------------------------------------------------------
# Performance Metrics
# -----------------------------------------------------------------------------
metrics:
  track:
    - "win_rate"
    - "profit_factor"
    - "average_r"
    - "max_drawdown"
    - "sharpe_ratio"
    - "calmar_ratio"
    - "avg_trade_duration"
    - "slippage_avg"
    - "fees_total"

  track_by_regime: true

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
environment: "mainnet"
dry_run: false
