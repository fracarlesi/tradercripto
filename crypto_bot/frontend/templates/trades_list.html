{% extends "base.html" %}
{% block title %}Trades — HLQuantBot{% endblock %}
{% block content %}
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-bold">Trades</h1>
    <form class="flex gap-2 text-sm" method="get" action="/trades">
      <input type="text" name="symbol" value="{{ symbol }}" placeholder="Filter symbol"
             class="bg-gray-900 border border-gray-800 rounded px-3 py-1 text-gray-200">
      <button class="bg-blue-600 hover:bg-blue-500 px-3 py-1 rounded">Filter</button>
    </form>
  </div>
  {% include "partials/trades_table.html" %}
{% endblock %}
