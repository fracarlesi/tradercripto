{% extends "base.html" %}
{% block content %}
  <h1 class="text-2xl font-bold mb-4">Overview</h1>
  <div hx-get="/partials/summary" hx-trigger="load, every 10s" hx-swap="innerHTML">
    {% include "partials/summary_cards.html" %}
  </div>
  <div class="mt-8">
    <h2 class="text-lg font-semibold mb-2 text-gray-200">Open trades (live)</h2>
    <div hx-get="/partials/open_trades" hx-trigger="load, every 10s" hx-swap="innerHTML">
      <div class="text-sm text-gray-500">Loading…</div>
    </div>
  </div>
  <div class="mt-8">
    <a href="/trades" class="inline-block bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium px-4 py-2 rounded">
      Browse trades
    </a>
  </div>
{% endblock %}
