# =============================================================================
# HLQuantBot v3.0 - Momentum Scalper Configuration
# =============================================================================
# Strategy: EMA9/EMA21 crossover on 15m with RSI filter
# Target: Validation mode — capital ladder starting at $65 USDC
# Risk: Fixed TP/SL (2.5%/1.0%), 10x leverage, LONG+SHORT
# =============================================================================

# -----------------------------------------------------------------------------
# Universe
# -----------------------------------------------------------------------------
universe:
  mode: "all"

  min_volume_24h: 500000   # Filtered universe: v7 trained on >$500K volume assets
  min_market_cap: 0

  exclude_symbols:
    # Stablecoins
    - "USDC"
    - "USDT"
    - "DAI"
    - "USDM"
    - "FDUSD"
    - "TUSD"
    # Delisted / migrated tokens (generate "Insufficient data" warnings)
    - "MATIC"
    - "RNDR"
    - "FTM"
    - "MKR"
    - "FXS"
    - "HPOS"
    - "RLB"
    - "UNIBOT"
    - "OX"
    - "FRIEND"
    - "SHIA"
    - "CYBER"
    - "BLZ"
    - "LOOM"
    - "OGN"
    - "RDNT"
    - "BNT"
    - "CANTO"
    - "REQ"
    - "ORBS"
    - "STG"
    - "STRAX"
    - "BADGER"
    - "ILV"
    - "NFTI"
    - "NTRN"
    - "PANDORA"
    - "PIXEL"
    - "AI"
    - "MYRO"
    - "OMNI"
    - "LISTA"
    - "kDOGS"
    - "CATI"
    - "NEIROETH"
    - "AI16Z"
    - "JELLY"
    - "LAUNCHCOIN"
    # No candle data available
    - "OM"
    # Gold-backed token — doesn't respond to crypto momentum signals
    - "PAXG"

  assets:
    - symbol: "BTC"
      enabled: true
      min_notional: 10
      max_notional: 50000
    - symbol: "ETH"
      enabled: true
      min_notional: 10
      max_notional: 50000
    - symbol: "SOL"
      enabled: true
      min_notional: 10
      max_notional: 50000

# -----------------------------------------------------------------------------
# Timeframes
# -----------------------------------------------------------------------------
timeframes:
  primary: "15m"
  bars_to_fetch: 200
  scan_interval_minutes: 5

# -----------------------------------------------------------------------------
# Risk Management
# -----------------------------------------------------------------------------
risk:
  # --- Position sizing (Kelly fallback + hard caps) ---
  # per_trade_pct is the Kelly fallback risk fraction when ML confidence is missing.
  # In practice, max_position_pct is ALWAYS the binding constraint on small accounts:
  #   $65 equity × 85% cap = $55.25 max notional → effective risk = $0.55/trade (0.85% equity)
  per_trade_pct: 25.0
  max_per_trade_pct: 30.0       # Kelly clamp (half-Kelly capped here)

  max_positions: 1              # Validation mode: single position
  max_exposure_pct: 100         # 1 position × 85% max = 85% (ceiling, not target)
  max_position_pct: 85          # Hard cap: max notional = 85% of equity ($55 on $65 acct)

  leverage: 3                   # Validation mode: conservative leverage
  max_leverage: 5

  correlation_limit: 0.7
  max_daily_trades: 3           # Validation mode: conservative trade cap

# -----------------------------------------------------------------------------
# Kill Switch
# -----------------------------------------------------------------------------
kill_switch:
  enabled: true

  daily_loss_pct: 6.0
  daily_loss_action: "pause_until_tomorrow"

  weekly_loss_pct: 15.0
  weekly_loss_action: "pause_3_days"

  max_drawdown_pct: 25.0
  max_drawdown_action: "stop_all"

  check_interval_seconds: 60

# -----------------------------------------------------------------------------
# Stops - Fixed TP/SL
# -----------------------------------------------------------------------------
stops:
  stop_loss_pct: 1.0       # v7 replay validated: PF 2.39, 287 trades
  take_profit_pct: 2.5     # v7 target-aligned: TP=2.5% labeling + replay
  breakeven_threshold_pct: 99.0  # DISABLED — destroys profitability in replay
  # Note: TP/SL are always server-side trigger orders (hardcoded in execution_engine)

  # Max hold: close "dead trades" (abs(pnl) < 0.3%) after this many hours.
  # Profitable/losing trades beyond this threshold are NOT force-closed.
  # Aligned with training labels (24 bars × 15m = 6h).
  max_hold_hours: 6

  # ATR multipliers — used ONLY by the trailing stop system (after breakeven).
  # NOT used for initial TP/SL placement (which always uses stop_loss_pct / take_profit_pct above).
  initial_atr_mult: 2.5           # Deprecated for initial TP/SL — kept for trailing reference only
  trailing_atr_mult: 0            # DISABLED — pure TP/SL only (grid replay validated)
  trailing_update_interval: 300

  # Graduated ROI - DISABLED (backtest showed it cuts winners prematurely)
  minimal_roi:
    "0": 9.0

  # Momentum Fade Exit — DISABLED (backtest showed it cuts winners prematurely)
  momentum_exit:
    enabled: true
    min_age_minutes: 5
    min_profit_pct: 9.0        # Effectively disabled — 900% profit threshold never reached
    rsi_slope_threshold: 1.0

# -----------------------------------------------------------------------------
# Regime Detection
# -----------------------------------------------------------------------------
regime:
  trend_adx_entry_min: 28     # Stricter entry: need strong trend to open
  trend_adx_exit_min: 22      # Lenient exit: allow trend to weaken before closing
  range_adx_max: 20
  choppiness_range_min: 60
  confirmation_bars: 2         # 30 min (2 bars × 15m) — faster regime transitions
  regime_exit_grace_minutes: 99999 # DISABLED — backtest showed regime exit cuts winners prematurely

# -----------------------------------------------------------------------------
# Strategies
# -----------------------------------------------------------------------------
strategies:
  trend_follow:
    enabled: false
  trend_momentum:
    enabled: false  # Replaced by ML-primary pipeline

# -----------------------------------------------------------------------------
# Volume Breakout Signal
# -----------------------------------------------------------------------------
volume_breakout:
  enabled: true
  min_volume_ratio: 1.5       # Volume 1.5x above SMA20 (was 2.0 — catches gradual pumps)
  min_candle_body_pct: 0.3    # |close-open|/open * 100
  min_atr_pct: 0.15           # Minimum volatility
  rsi_min: 25                 # RSI floor
  rsi_max: 90                 # RSI ceiling (was 80 — allow entry during explosive pumps)
  allowed_regimes:            # Can fire in CHAOS (key advantage!)
    - "chaos"
    - "trend"

# -----------------------------------------------------------------------------
# Momentum Burst Signal
# -----------------------------------------------------------------------------
momentum_burst:
  enabled: true
  min_rsi_slope: 8.0            # RSI[i] - RSI[i-2] threshold
  min_candle_body_pct: 0.3      # |close-open|/open * 100
  max_rsi_entry: 75             # Enter BEFORE overbought
  min_volume_ratio: 1.2         # Minimum volume confirmation
  allowed_regimes:
    - "chaos"
    - "trend"

# -----------------------------------------------------------------------------
# LLM Veto - DeepSeek confirmation/veto
# -----------------------------------------------------------------------------
llm:
  enabled: false
  role: "veto_only"

  provider: "deepseek"
  model: "deepseek-chat"
  api_key_env: "DEEPSEEK_API_KEY"

  max_calls_per_day: 50000
  timeout_seconds: 10

  fallback_on_error: "deny"
  fallback_on_chaos: "deny"

  min_confidence: 0.6

# -----------------------------------------------------------------------------
# Execution
# -----------------------------------------------------------------------------
execution:
  prefer_limit: true
  limit_timeout_seconds: 90
  entry_mode: "maker"
  maker_reprice_interval_seconds: 5
  maker_max_reprices: 6         # Validation mode: fewer reprices → skip if no fill

  max_slippage_pct: 0.15       # Validation mode: tight slippage control
  max_spread_pct: 0.08         # Validation mode: only liquid assets

  max_retries: 3
  retry_delay_seconds: 5

  place_stop_immediately: true

# -----------------------------------------------------------------------------
# Monitoring & Alerts
# -----------------------------------------------------------------------------
monitoring:
  equity_snapshot_interval: 300

  telegram:
    enabled: false

  whatsapp:
    enabled: true
    topic: ${NTFY_TOPIC:}
    server: "https://ntfy.sh"
    alert_on:
      - "trade_open"
      - "trade_close"
      - "kill_switch_trigger"
      - "error"

  log_level: "INFO"
  log_trades: true
  log_decisions: true

# -----------------------------------------------------------------------------
# Protections
# -----------------------------------------------------------------------------
protections:
  - name: "StoplossGuard"
    lookback_period_min: 60
    stoploss_limit: 3
    stop_duration_min: 360

  - name: "MaxDrawdown"
    lookback_period_min: 1440
    max_drawdown_pct: 8.0
    stop_duration_min: 720


  - name: "LowPerformance"
    min_trades: 20              # Need 20+ trades before judging
    max_profit_factor: 0.90     # Block if PF < 0.90 (losing money after fees)
    require_negative_pnl: true  # Only block if net_pnl < 0 (confirms real loss)
    stop_duration_min: 1440     # Pause 24h

# -----------------------------------------------------------------------------
# Performance Metrics
# -----------------------------------------------------------------------------
metrics:
  track:
    - "win_rate"
    - "profit_factor"
    - "average_r"
    - "max_drawdown"
    - "sharpe_ratio"
    - "calmar_ratio"
    - "avg_trade_duration"
    - "slippage_avg"
    - "fees_total"

  track_by_regime: true

# -----------------------------------------------------------------------------
# ML Model - XGBoost trade selector
# -----------------------------------------------------------------------------
ml_model:
  enabled: true
  model_path: "models/trade_model.joblib"
  min_probability: 0.58        # Grid replay optimal (XGB+LGB ensemble): +$93, PF 1.32, Sharpe 17.8
  retrain_days: 90             # 3× training window to reduce overfitting
  retrain_interval_days: 3     # Ogni quanto ri-addestrare

# -----------------------------------------------------------------------------
# Capital Ladder — Progressive scale-up with objective criteria
# -----------------------------------------------------------------------------
capital_ladder:
  enabled: true
  current_level: 0
  auto_promote: false
  auto_demote: false
  levels:
    - level: 0
      label: "test_65"
      target_capital_usd: 65
      min_closed_trades: 30
      min_live_days: 14
      min_profit_factor: 1.15
      min_net_pnl_usd: 0.5
      max_drawdown_pct: 10.0
      min_maker_fill_ratio_pct: 70.0
    - level: 1
      label: "step_250"
      target_capital_usd: 250
      min_closed_trades: 30
      min_live_days: 14
      min_profit_factor: 1.15
      min_net_pnl_usd: 2.0
      max_drawdown_pct: 10.0
      min_maker_fill_ratio_pct: 70.0
    - level: 2
      label: "step_500"
      target_capital_usd: 500
      min_closed_trades: 35
      min_live_days: 14
      min_profit_factor: 1.15
      min_net_pnl_usd: 4.0
      max_drawdown_pct: 10.0
      min_maker_fill_ratio_pct: 68.0
    - level: 3
      label: "step_1500"
      target_capital_usd: 1500
      min_closed_trades: 40
      min_live_days: 21
      min_profit_factor: 1.18
      min_net_pnl_usd: 10.0
      max_drawdown_pct: 9.0
      min_maker_fill_ratio_pct: 65.0
    - level: 4
      label: "step_3000"
      target_capital_usd: 3000
      min_closed_trades: 40
      min_live_days: 21
      min_profit_factor: 1.18
      min_net_pnl_usd: 20.0
      max_drawdown_pct: 9.0
      min_maker_fill_ratio_pct: 65.0
    - level: 5
      label: "step_5000"
      target_capital_usd: 5000
      min_closed_trades: 50
      min_live_days: 30
      min_profit_factor: 1.20
      min_net_pnl_usd: 35.0
      max_drawdown_pct: 8.5
      min_maker_fill_ratio_pct: 62.0
    - level: 6
      label: "step_10000"
      target_capital_usd: 10000
      min_closed_trades: 60
      min_live_days: 30
      min_profit_factor: 1.20
      min_net_pnl_usd: 70.0
      max_drawdown_pct: 8.0
      min_maker_fill_ratio_pct: 60.0

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
environment: "mainnet"
dry_run: false
