# =============================================================================
# HLQuantBot v3.0 - Momentum Scalper Configuration
# =============================================================================
# Strategy: EMA9/EMA21 crossover on 15m with RSI filter
# Target: Aggressive growth on small account ($86 USDC)
# Risk: Fixed TP/SL (2.0%/1.0%), 10x leverage, LONG+SHORT
# =============================================================================

# -----------------------------------------------------------------------------
# Universe
# -----------------------------------------------------------------------------
universe:
  mode: "all"

  min_volume_24h: 100000
  min_market_cap: 0

  exclude_symbols:
    # Stablecoins
    - "USDC"
    - "USDT"
    - "DAI"
    - "USDM"
    - "FDUSD"
    - "TUSD"
    # Delisted / migrated tokens (generate "Insufficient data" warnings)
    - "MATIC"
    - "RNDR"
    - "FTM"
    - "MKR"
    - "FXS"
    - "HPOS"
    - "RLB"
    - "UNIBOT"
    - "OX"
    - "FRIEND"
    - "SHIA"
    - "CYBER"
    - "BLZ"
    - "LOOM"
    - "OGN"
    - "RDNT"
    - "BNT"
    - "CANTO"
    - "REQ"
    - "ORBS"
    - "STG"
    - "STRAX"
    - "BADGER"
    - "ILV"
    - "NFTI"
    - "NTRN"
    - "PANDORA"
    - "PIXEL"
    - "AI"
    - "MYRO"
    - "OMNI"
    - "LISTA"
    - "kDOGS"
    - "CATI"
    - "NEIROETH"
    - "AI16Z"
    - "JELLY"
    - "LAUNCHCOIN"
    # No candle data available
    - "OM"

  assets:
    - symbol: "BTC"
      enabled: true
      min_notional: 10
      max_notional: 50000
    - symbol: "ETH"
      enabled: true
      min_notional: 10
      max_notional: 50000
    - symbol: "SOL"
      enabled: true
      min_notional: 10
      max_notional: 50000

# -----------------------------------------------------------------------------
# Timeframes
# -----------------------------------------------------------------------------
timeframes:
  primary: "15m"
  bars_to_fetch: 200
  scan_interval_minutes: 5

# -----------------------------------------------------------------------------
# Risk Management
# -----------------------------------------------------------------------------
risk:
  per_trade_pct: 15.0
  max_per_trade_pct: 20.0

  max_positions: 4          # Was 3 — exposure cap at 300% is the real safety net
  max_exposure_pct: 300
  max_position_pct: 60      # Was 70 — smaller per-position to compensate for 4th slot

  leverage: 10
  max_leverage: 20

  correlation_limit: 0.7
  max_daily_trades: 0   # 0 = unlimited — other protections handle risk (StoplossGuard, KillSwitch, MaxDrawdown)

# -----------------------------------------------------------------------------
# Kill Switch
# -----------------------------------------------------------------------------
kill_switch:
  enabled: true

  daily_loss_pct: 8.0
  daily_loss_action: "pause_until_tomorrow"

  weekly_loss_pct: 15.0
  weekly_loss_action: "pause_3_days"

  max_drawdown_pct: 30.0
  max_drawdown_action: "stop_all"

  check_interval_seconds: 60

# -----------------------------------------------------------------------------
# Stops - Fixed TP/SL
# -----------------------------------------------------------------------------
stops:
  stop_loss_pct: 1.0       # Was 0.8 — sweep showed wider SL avoids premature stop-outs (+11pp win rate)
  take_profit_pct: 2.0     # Widened from 1.6 — let winners run (R:R 2:1)
  breakeven_threshold_pct: 1.2
  # Note: TP/SL are always server-side trigger orders (hardcoded in execution_engine)

  # ATR multipliers — used ONLY by the trailing stop system (after breakeven).
  # NOT used for initial TP/SL placement (which always uses stop_loss_pct / take_profit_pct above).
  initial_atr_mult: 2.5           # Deprecated for initial TP/SL — kept for trailing reference only
  trailing_atr_mult: 1.5          # Trail distance = entry_atr_pct * trailing_atr_mult
  trailing_update_interval: 300

  # Graduated ROI - time-based profit targets
  minimal_roi:
    "0": 0.04
    "60": 0.02
    "120": 0.01
    "240": 0.005
    "360": 0.0

  # Momentum Fade Exit — close when momentum dies while still in profit
  momentum_exit:
    enabled: true
    min_age_minutes: 5         # 1 scan cycle — RSI slope needs at least one refresh
    min_profit_pct: 0.5        # Raised from 0.1 — don't fade exits on tiny gains
    rsi_slope_threshold: 1.0   # LONG faded: rsi_slope < +1.0; SHORT faded: rsi_slope > -1.0

# -----------------------------------------------------------------------------
# Regime Detection
# -----------------------------------------------------------------------------
regime:
  trend_adx_entry_min: 28     # Stricter entry: need strong trend to open
  trend_adx_exit_min: 22      # Lenient exit: allow trend to weaken before closing
  range_adx_max: 20
  choppiness_range_min: 60
  confirmation_bars: 2         # 30 min (2 bars × 15m) — faster regime transitions

# -----------------------------------------------------------------------------
# Strategies
# -----------------------------------------------------------------------------
strategies:
  trend_follow:
    enabled: false
  trend_momentum:
    enabled: false  # Replaced by ML-primary pipeline

# -----------------------------------------------------------------------------
# Volume Breakout Signal
# -----------------------------------------------------------------------------
volume_breakout:
  enabled: true
  min_volume_ratio: 1.5       # Volume 1.5x above SMA20 (was 2.0 — catches gradual pumps)
  min_candle_body_pct: 0.3    # |close-open|/open * 100
  min_atr_pct: 0.15           # Minimum volatility
  rsi_min: 25                 # RSI floor
  rsi_max: 90                 # RSI ceiling (was 80 — allow entry during explosive pumps)
  allowed_regimes:            # Can fire in CHAOS (key advantage!)
    - "chaos"
    - "trend"

# -----------------------------------------------------------------------------
# Momentum Burst Signal
# -----------------------------------------------------------------------------
momentum_burst:
  enabled: true
  min_rsi_slope: 8.0            # RSI[i] - RSI[i-2] threshold
  min_candle_body_pct: 0.3      # |close-open|/open * 100
  max_rsi_entry: 75             # Enter BEFORE overbought
  min_volume_ratio: 1.2         # Minimum volume confirmation
  allowed_regimes:
    - "chaos"
    - "trend"

# -----------------------------------------------------------------------------
# LLM Veto - DeepSeek confirmation/veto
# -----------------------------------------------------------------------------
llm:
  enabled: false
  role: "veto_only"

  provider: "deepseek"
  model: "deepseek-chat"
  api_key_env: "DEEPSEEK_API_KEY"

  max_calls_per_day: 50000
  timeout_seconds: 30

  fallback_on_error: "deny"
  fallback_on_chaos: "deny"

  min_confidence: 0.6

# -----------------------------------------------------------------------------
# Execution
# -----------------------------------------------------------------------------
execution:
  prefer_limit: true
  limit_timeout_seconds: 60

  max_slippage_pct: 0.30       # Aligned with spread — was 0.25% causing instant position closes
  max_spread_pct: 0.30         # Tightened from 0.35% — aligned with slippage to avoid open+close waste

  max_retries: 3
  retry_delay_seconds: 5

  place_stop_immediately: true

# -----------------------------------------------------------------------------
# Monitoring & Alerts
# -----------------------------------------------------------------------------
monitoring:
  equity_snapshot_interval: 300

  telegram:
    enabled: false

  whatsapp:
    enabled: true
    topic: ${NTFY_TOPIC:}
    server: "https://ntfy.sh"
    alert_on:
      - "trade_open"
      - "trade_close"
      - "kill_switch_trigger"
      - "error"

  log_level: "INFO"
  log_trades: true
  log_decisions: true

# -----------------------------------------------------------------------------
# Protections
# -----------------------------------------------------------------------------
protections:
  - name: "StoplossGuard"
    lookback_period_min: 60
    stoploss_limit: 3
    stop_duration_min: 360

  - name: "MaxDrawdown"
    lookback_period_min: 1440
    max_drawdown_pct: 8.0
    stop_duration_min: 720


  - name: "LowPerformance"
    min_trades: 20
    min_win_rate: 0.25
    stop_duration_min: 1440

# -----------------------------------------------------------------------------
# Performance Metrics
# -----------------------------------------------------------------------------
metrics:
  track:
    - "win_rate"
    - "profit_factor"
    - "average_r"
    - "max_drawdown"
    - "sharpe_ratio"
    - "calmar_ratio"
    - "avg_trade_duration"
    - "slippage_avg"
    - "fees_total"

  track_by_regime: true

# -----------------------------------------------------------------------------
# ML Model - XGBoost trade selector
# -----------------------------------------------------------------------------
ml_model:
  enabled: true
  model_path: "models/trade_model.joblib"
  min_probability: 0.52        # Leverage-aware sweep optimal — was 0.55, best Sharpe 2.33
  retrain_days: 30             # Giorni di dati per training
  retrain_interval_days: 3     # Ogni quanto ri-addestrare

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
environment: "mainnet"
dry_run: false
