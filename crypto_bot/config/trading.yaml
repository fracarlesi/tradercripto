# =============================================================================
# HLQuantBot v5 - FLAG-Trader Configuration
# =============================================================================
# Decisor: FLAG-Trader LLM (Qwen 0.5B + PPO-trained policy/value/tp/sl heads)
# Flow: RealtimeMonitor → FlagTraderAgent → RiskManager → Execution
# Risk: Dynamic risk/leverage from LLM confidence, model-predicted TP/SL
# =============================================================================

# -----------------------------------------------------------------------------
# Universe
# -----------------------------------------------------------------------------
universe:
  mode: "all"

  min_volume_24h: 500000

  exclude_symbols:
    # Stablecoins
    - "USDC"
    - "USDT"
    - "DAI"
    - "USDM"
    - "FDUSD"
    - "TUSD"
    # Delisted / migrated tokens (generate "Insufficient data" warnings)
    - "MATIC"
    - "RNDR"
    - "FTM"
    - "MKR"
    - "FXS"
    - "HPOS"
    - "RLB"
    - "UNIBOT"
    - "OX"
    - "FRIEND"
    - "SHIA"
    - "CYBER"
    - "BLZ"
    - "LOOM"
    - "OGN"
    - "RDNT"
    - "BNT"
    - "CANTO"
    - "REQ"
    - "ORBS"
    - "STG"
    - "STRAX"
    - "BADGER"
    - "ILV"
    - "NFTI"
    - "NTRN"
    - "PANDORA"
    - "PIXEL"
    - "AI"
    - "MYRO"
    - "OMNI"
    - "LISTA"
    - "kDOGS"
    - "CATI"
    - "NEIROETH"
    - "AI16Z"
    - "JELLY"
    - "LAUNCHCOIN"
    # No candle data available
    - "OM"
    # Gold-backed token — doesn't respond to crypto momentum signals
    - "PAXG"

  assets:
    - symbol: "BTC"
      enabled: true
    - symbol: "ETH"
      enabled: true
    - symbol: "SOL"
      enabled: true

# -----------------------------------------------------------------------------
# Timeframes
# -----------------------------------------------------------------------------
timeframes:
  primary: "15m"
  bars_to_fetch: 200
  scan_interval_minutes: 5

# -----------------------------------------------------------------------------
# Risk Management
# -----------------------------------------------------------------------------
risk:
  # Dynamic risk scaling (based on LLM confidence)
  min_per_trade_pct: 10.0       # risk % at confidence threshold (0.6)
  max_per_trade_pct: 30.0       # risk % at confidence 1.0

  max_exposure_pct: 100
  max_position_pct: 85          # Hard cap: max notional = 85% of equity

  # Dynamic leverage scaling (based on LLM confidence)
  min_leverage: 2               # leverage at confidence threshold
  max_leverage: 5               # leverage at confidence 1.0

# -----------------------------------------------------------------------------
# Stops — Model-predicted TP/SL + LLM 60s eval loop
# -----------------------------------------------------------------------------
# Triple exit mechanism:
# 1. Model-predicted SL placed at entry (defines 1R = risk unit)
# 2. Mechanical R-based exits: breakeven protection, strength TP, trailing
# 3. LLM re-evaluates open positions every 60s (can close on violation)
#
# R-multiple system: 1R = distance from entry to initial stop loss
# Example: entry $100, SL $98 → 1R = 2% → 2R profit = $104
stops:
  stop_loss_pct: 0              # Config fallback SL (0 = use model-predicted only)
  take_profit_pct: 0            # Config fallback TP (0 = use R-based system below)
  max_hold_hours: 0             # 0 = disabled (LLM manages hold duration)
  trailing_atr_mult: 0          # Legacy ATR trailing (0 = disabled, use R-based below)

  # --- R-based exit system (mechanical, no LLM needed) ---
  r_based_exits:
    enabled: true

    # Breakeven protection: move SL to entry when profit reaches bp_activation_r
    bp_activation_r: 2.0        # Activate breakeven at +2R profit
    bp_offset_pct: 0.15         # Offset above entry to cover fees (0.15%)

    # Strength exit: auto-close at high R-multiple (take profit)
    strength_exit_r: 3.0        # Close position at +3R profit

    # R-based trailing stop: after BP, trail SL upward as profit grows
    trailing_enabled: true
    trailing_start_r: 2.0       # Start trailing after this R-multiple
    trailing_step_r: 1.0        # For every +1R gained above trailing_start_r...
    trailing_lock_r: 0.5        # ...lock 0.5R of that gain (SL moves up 0.5R)

  # --- Violation exit (hint to LLM, not mechanical) ---
  # When price violates a technical level while in profit, this info is
  # added to the LLM prompt as an exit suggestion (not forced).
  violation_exit:
    enabled: true
    ema_period: 4               # EMA period for violation check
    ema_source: "high"          # "high" for longs, "low" for shorts
    min_profit_pct: 0.3         # Only suggest violation exit if in profit

# -----------------------------------------------------------------------------
# Regime Detection
# -----------------------------------------------------------------------------
regime:
  trend_adx_entry_min: 28
  trend_adx_exit_min: 22
  range_adx_max: 20
  choppiness_range_min: 60
  confirmation_bars: 2
  regime_exit_grace_minutes: 99999  # DISABLED

# -----------------------------------------------------------------------------
# Execution
# -----------------------------------------------------------------------------
execution:
  entry_mode: "maker"
  maker_reprice_interval_seconds: 5
  maker_max_reprices: 6

  max_slippage_pct: 0.15
  max_spread_pct: 0.08

  max_retries: 3
  retry_delay_seconds: 5

# -----------------------------------------------------------------------------
# Monitoring & Alerts
# -----------------------------------------------------------------------------
monitoring:
  equity_snapshot_interval: 300

  telegram:
    enabled: false

  whatsapp:
    enabled: true
    topic: ${NTFY_TOPIC:}
    server: "https://ntfy.sh"
    alert_on:
      - "trade_open"
      - "trade_close"
      - "kill_switch_trigger"
      - "error"

# -----------------------------------------------------------------------------
# FLAG-Trader — LLM-based trade decisor
# -----------------------------------------------------------------------------
flag_trader:
  enabled: true
  model_name: "Qwen/Qwen2.5-0.5B-Instruct"
  checkpoint_path: "models/flag_trader_qwen/final_model.pt"
  device: "cpu"
  scan_interval_seconds: 300
  max_assets_to_scan: 10
  candle_window: 20
  candle_interval: "15m"
  confidence_threshold: 0.6
  min_hold_minutes: 30
  min_net_profit_pct_to_close: 0.15

# -----------------------------------------------------------------------------
# Squeeze Trigger — Bollinger-Keltner Compression → Expansion
# -----------------------------------------------------------------------------
squeeze_trigger:
  enabled: true

  # Candle settings
  candle_interval: "15m"
  candle_limit: 50
  candle_ttl_seconds: 300

  # Bollinger Bands
  bb_period: 20
  bb_std_mult: 2.0

  # Keltner Channel
  kc_ema_period: 20
  kc_atr_period: 14
  kc_atr_mult: 1.5

  # Fire condition
  lookback_bars: 3
