# =============================================================================
# HLQuantBot v5 - Paper Trading Configuration (Testnet)
# =============================================================================
# This file is loaded via: python main.py -c crypto_bot/config/trading_paper.yaml
# There is NO config inheritance — this is a standalone copy of trading.yaml.
# When updating trading.yaml, sync changes here (except intentional differences).
#
# ---- DIFFERENCES vs trading.yaml (production) ----
#
# universe.min_volume_24h:          100000 (prod: 500000)
# risk.min_per_trade_pct:           8.0    (prod: 10.0)
# risk.max_per_trade_pct:           25.0   (prod: 30.0)
# risk.max_exposure_pct:            270    (prod: 100)
# risk.max_position_pct:            60     (prod: 85)
# risk.min_leverage:                2      (prod: 2)
# risk.max_leverage:                10     (prod: 5)
# stops:                            SAME as prod (LLM-only exit management)
# execution.maker_max_reprices:     12     (prod: 6)
# execution.max_slippage_pct:       0.30   (prod: 0.15)
# execution.max_spread_pct:         0.15   (prod: 0.08)
# environment:                      testnet (prod: not set)
# =============================================================================

# -----------------------------------------------------------------------------
# Universe
# -----------------------------------------------------------------------------
universe:
  mode: "all"

  min_volume_24h: 100000

  exclude_symbols:
    # Stablecoins
    - "USDC"
    - "USDT"
    - "DAI"
    - "USDM"
    - "FDUSD"
    - "TUSD"
    # Delisted / migrated tokens
    - "MATIC"
    - "RNDR"
    - "FTM"
    - "MKR"
    - "FXS"
    - "HPOS"
    - "RLB"
    - "UNIBOT"
    - "OX"
    - "FRIEND"
    - "SHIA"
    - "CYBER"
    - "BLZ"
    - "LOOM"
    - "OGN"
    - "RDNT"
    - "BNT"
    - "CANTO"
    - "REQ"
    - "ORBS"
    - "STG"
    - "STRAX"
    - "BADGER"
    - "ILV"
    - "NFTI"
    - "NTRN"
    - "PANDORA"
    - "PIXEL"
    - "AI"
    - "MYRO"
    - "OMNI"
    - "LISTA"
    - "kDOGS"
    - "CATI"
    - "NEIROETH"
    - "AI16Z"
    - "JELLY"
    - "LAUNCHCOIN"
    - "OM"
    - "PAXG"

  assets:
    - symbol: "BTC"
      enabled: true
    - symbol: "ETH"
      enabled: true
    - symbol: "SOL"
      enabled: true

# -----------------------------------------------------------------------------
# Timeframes
# -----------------------------------------------------------------------------
timeframes:
  primary: "15m"
  bars_to_fetch: 200
  scan_interval_minutes: 5

# -----------------------------------------------------------------------------
# Risk Management
# -----------------------------------------------------------------------------
risk:
  # Dynamic risk scaling (based on LLM confidence)
  min_per_trade_pct: 8.0        # risk % at confidence threshold (0.6)
  max_per_trade_pct: 25.0       # risk % at confidence 1.0

  max_exposure_pct: 270
  max_position_pct: 60

  # Dynamic leverage scaling (based on LLM confidence)
  min_leverage: 2               # leverage at confidence threshold
  max_leverage: 10              # leverage at confidence 1.0

# -----------------------------------------------------------------------------
# Stops — Model-predicted TP/SL + LLM 60s eval loop
# -----------------------------------------------------------------------------
# Dual exit mechanism:
# 1. Model-predicted TP/SL placed as orders on the exchange at entry
# 2. LLM re-evaluates open positions every 60 seconds (can close early)
# Config values below are fallbacks if model predictions are missing.
stops:
  stop_loss_pct: 0
  take_profit_pct: 0
  breakeven_threshold_pct: 99.0
  max_hold_hours: 0
  trailing_atr_mult: 0

# -----------------------------------------------------------------------------
# Regime Detection
# -----------------------------------------------------------------------------
regime:
  trend_adx_entry_min: 28
  trend_adx_exit_min: 22
  range_adx_max: 20
  choppiness_range_min: 60
  confirmation_bars: 2
  regime_exit_grace_minutes: 99999

# -----------------------------------------------------------------------------
# Execution
# -----------------------------------------------------------------------------
execution:
  entry_mode: "maker"
  maker_reprice_interval_seconds: 5
  maker_max_reprices: 12

  max_slippage_pct: 0.30
  max_spread_pct: 0.15

  max_retries: 3
  retry_delay_seconds: 5

# -----------------------------------------------------------------------------
# Monitoring & Alerts
# -----------------------------------------------------------------------------
monitoring:
  equity_snapshot_interval: 300

  telegram:
    enabled: false

  whatsapp:
    enabled: true
    topic: ${NTFY_TOPIC:}
    server: "https://ntfy.sh"
    alert_on:
      - "trade_open"
      - "trade_close"
      - "kill_switch_trigger"
      - "error"

# -----------------------------------------------------------------------------
# FLAG-Trader
# -----------------------------------------------------------------------------
flag_trader:
  enabled: true
  model_name: "Qwen/Qwen2.5-0.5B-Instruct"
  checkpoint_path: "models/flag_trader_qwen/final_model.pt"
  device: "cpu"
  scan_interval_seconds: 300
  max_assets_to_scan: 10
  candle_window: 20
  candle_interval: "15m"
  confidence_threshold: 0.6
  min_hold_minutes: 30
  min_net_profit_pct_to_close: 0.15

# -----------------------------------------------------------------------------
# Squeeze Trigger — Bollinger-Keltner Compression → Expansion
# -----------------------------------------------------------------------------
squeeze_trigger:
  enabled: true

  # Candle settings
  candle_interval: "15m"
  candle_limit: 50
  candle_ttl_seconds: 300

  # Bollinger Bands
  bb_period: 20
  bb_std_mult: 2.0

  # Keltner Channel
  kc_ema_period: 20
  kc_atr_period: 14
  kc_atr_mult: 1.5

  # Fire condition
  lookback_bars: 3

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
environment: "testnet"
dry_run: false
