# =============================================================================
# HLQuantBot v5 - Paper Trading Configuration (Testnet)
# =============================================================================
# This file is loaded via: python main.py -c crypto_bot/config/trading_paper.yaml
# There is NO config inheritance — this is a standalone copy of trading.yaml.
# When updating trading.yaml, sync changes here (except intentional differences).
#
# ---- DIFFERENCES vs trading.yaml (production) ----
#
# universe.min_volume_24h:          100000 (prod: 500000)
# risk.per_trade_pct:               18.0   (prod: 25.0)
# risk.max_per_trade_pct:           25.0   (prod: 30.0)
# risk.max_positions:               3      (prod: 1)
# risk.max_exposure_pct:            270    (prod: 100)
# risk.max_position_pct:            60     (prod: 85)
# risk.leverage:                    10     (prod: 3)
# risk.max_daily_trades:            0      (prod: 3)
# stops:                            SAME as prod (LLM-only exit management)
# execution.maker_max_reprices:     12     (prod: 6)
# execution.max_slippage_pct:       0.30   (prod: 0.15)
# execution.max_spread_pct:         0.15   (prod: 0.08)
# environment:                      testnet (prod: not set)
# =============================================================================

# -----------------------------------------------------------------------------
# Universe
# -----------------------------------------------------------------------------
universe:
  mode: "all"

  min_volume_24h: 100000

  exclude_symbols:
    # Stablecoins
    - "USDC"
    - "USDT"
    - "DAI"
    - "USDM"
    - "FDUSD"
    - "TUSD"
    # Delisted / migrated tokens
    - "MATIC"
    - "RNDR"
    - "FTM"
    - "MKR"
    - "FXS"
    - "HPOS"
    - "RLB"
    - "UNIBOT"
    - "OX"
    - "FRIEND"
    - "SHIA"
    - "CYBER"
    - "BLZ"
    - "LOOM"
    - "OGN"
    - "RDNT"
    - "BNT"
    - "CANTO"
    - "REQ"
    - "ORBS"
    - "STG"
    - "STRAX"
    - "BADGER"
    - "ILV"
    - "NFTI"
    - "NTRN"
    - "PANDORA"
    - "PIXEL"
    - "AI"
    - "MYRO"
    - "OMNI"
    - "LISTA"
    - "kDOGS"
    - "CATI"
    - "NEIROETH"
    - "AI16Z"
    - "JELLY"
    - "LAUNCHCOIN"
    - "OM"
    - "PAXG"

  assets:
    - symbol: "BTC"
      enabled: true
    - symbol: "ETH"
      enabled: true
    - symbol: "SOL"
      enabled: true

# -----------------------------------------------------------------------------
# Timeframes
# -----------------------------------------------------------------------------
timeframes:
  primary: "15m"
  bars_to_fetch: 200
  scan_interval_minutes: 5

# -----------------------------------------------------------------------------
# Risk Management
# -----------------------------------------------------------------------------
risk:
  per_trade_pct: 18.0
  max_per_trade_pct: 25.0

  max_positions: 3
  max_exposure_pct: 270
  max_position_pct: 60

  leverage: 10
  max_daily_trades: 0

# -----------------------------------------------------------------------------
# Kill Switch
# -----------------------------------------------------------------------------
kill_switch:
  enabled: true

  daily_loss_pct: 6.0
  daily_loss_action: "pause_until_tomorrow"

  weekly_loss_pct: 15.0
  weekly_loss_action: "pause_3_days"

  max_drawdown_pct: 25.0
  max_drawdown_action: "stop_all"

  check_interval_seconds: 60

# -----------------------------------------------------------------------------
# Stops — DISABLED (LLM-only exit management)
# -----------------------------------------------------------------------------
# All exit decisions are made by the FLAG-Trader LLM every 60 seconds.
# No mechanical TP/SL, no max hold time, no trailing stops.
stops:
  # Legacy fields kept for compatibility — not enforced
  stop_loss_pct: 0
  take_profit_pct: 0
  breakeven_threshold_pct: 99.0
  max_hold_hours: 0
  trailing_atr_mult: 0

# -----------------------------------------------------------------------------
# Regime Detection
# -----------------------------------------------------------------------------
regime:
  trend_adx_entry_min: 28
  trend_adx_exit_min: 22
  range_adx_max: 20
  choppiness_range_min: 60
  confirmation_bars: 2
  regime_exit_grace_minutes: 99999

# -----------------------------------------------------------------------------
# Execution
# -----------------------------------------------------------------------------
execution:
  entry_mode: "maker"
  maker_reprice_interval_seconds: 5
  maker_max_reprices: 12

  max_slippage_pct: 0.30
  max_spread_pct: 0.15

  max_retries: 3
  retry_delay_seconds: 5

# -----------------------------------------------------------------------------
# Monitoring & Alerts
# -----------------------------------------------------------------------------
monitoring:
  equity_snapshot_interval: 300

  telegram:
    enabled: false

  whatsapp:
    enabled: true
    topic: ${NTFY_TOPIC:}
    server: "https://ntfy.sh"
    alert_on:
      - "trade_open"
      - "trade_close"
      - "kill_switch_trigger"
      - "error"

# -----------------------------------------------------------------------------
# FLAG-Trader
# -----------------------------------------------------------------------------
flag_trader:
  enabled: true
  model_name: "Qwen/Qwen2.5-0.5B-Instruct"
  checkpoint_path: "models/flag_trader_qwen/final_model.pt"
  device: "cpu"
  scan_interval_seconds: 300
  max_assets_to_scan: 10
  candle_window: 20
  candle_interval: "15m"
  confidence_threshold: 0.6
  min_hold_minutes: 30
  min_net_profit_pct_to_close: 0.15

# -----------------------------------------------------------------------------
# Squeeze Trigger — Bollinger-Keltner Compression → Expansion
# -----------------------------------------------------------------------------
squeeze_trigger:
  enabled: true

  # Candle settings
  candle_interval: "15m"
  candle_limit: 50
  candle_ttl_seconds: 300

  # Bollinger Bands
  bb_period: 20
  bb_std_mult: 2.0

  # Keltner Channel
  kc_ema_period: 20
  kc_atr_period: 14
  kc_atr_mult: 1.5

  # Fire condition
  lookback_bars: 3

# -----------------------------------------------------------------------------
# Environment
# -----------------------------------------------------------------------------
environment: "testnet"
dry_run: false
