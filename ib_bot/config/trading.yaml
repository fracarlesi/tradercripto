# =============================================================================
# IB Trading Bot - Configuration
# Opening Range Breakout (ORB) strategy for futures
# =============================================================================

# IB Connection
ib_connection:
  host: "127.0.0.1"
  port: 4002                    # TWS paper: 7497, TWS live: 7496, IB Gateway paper: 4002, live: 4001
  client_id: 1
  timeout: 30
  readonly: false
  reconnect_delay: 5
  max_reconnect_attempts: 10

# Contracts to trade
# MNQ disabled: OR ranges are 183-1138 ticks (always exceeds max_range_ticks)
# MNQ generates zero valid ORB setups — confirmed in 56-day walk-forward
contracts:
  - symbol: MES
    enabled: true
  - symbol: MNQ
    enabled: false
  - symbol: ES
    enabled: false
  - symbol: NQ
    enabled: false

# Opening Range
opening_range:
  or_start: "09:30"            # ET - market open
  or_end: "09:45"              # ET - 15 min opening range
  bar_size: "1 min"
  min_range_ticks: 4           # Skip too-flat ranges (lowered for more setups)
  max_range_ticks: 120         # Skip too-volatile ranges (raised to accept wider ranges)
  timezone: "US/Eastern"

# Strategy
# Evidence: max_entry 10:00 is the single strongest filter (PF 1.38→1.51, DD halved)
# Evidence: buffer=1 marginally better than 2 (+$78), minimal impact
# Evidence: VWAP confirmation has zero effect (identical results ON/OFF) — left ON as no-op
strategy:
  name: "orb"
  breakout_buffer_ticks: 1     # Reduced from 2: marginal improvement, less restrictive
  vwap_confirmation: true      # No measurable effect but harmless
  min_atr_ticks: 4             # Minimum ATR in ticks
  max_entry_time: "10:00"      # ET - restrict to first 15min after OR (strongest edge window)
  allow_short: true            # SHORT carries ~90% of P&L — do not disable
  no_reentry_after_stop: true  # No re-entry same direction after stop

# Stop and Target
# Evidence: R:R 2.0 = PF 1.38 (38 trades), R:R 2.5 = PF 1.51 (36 trades)
# Using 2.0 for more trades and conservative validation (38 vs 36)
stops:
  stop_type: "or_midpoint"     # Stop at OR midpoint
  stop_buffer_ticks: 2         # Buffer below stop level
  reward_risk_ratio: "2.0"     # R:R 2.0 — balances trade count vs edge
  trailing_enabled: false
  eod_flatten_time: "15:45"    # ET - flatten all before close

# Risk Management
# Validation sizing: minimum executable size for signal quality testing.
# 1 MES = smallest tradeable unit ($1.25/tick). Do NOT scale up until
# paper evidence meets scorecard CANDIDATE criteria (PF>1.2, 30+ trades).
# The paper account's $1M simulated equity is irrelevant — sizing is
# fixed at 1 contract to test edge, not to simulate P&L at scale.
risk:
  max_risk_per_trade_usd: "50"     # ~40 tick max risk on MES ($1.25/tick)
  max_daily_loss_usd: "200"        # 4x single-trade risk
  max_contracts_per_trade: 1       # Minimum executable size — do not increase during validation
  max_trades_per_day: 2
  consecutive_stops_halt: 2    # Halt after N consecutive stops

# EMA Momentum Strategy — DISABLED
# Walk-forward verdict: FAIL (0/4 OOS windows profitable, -$1585 OOS, degradation -0.29)
# Do not re-enable without new walk-forward evidence
ema_strategy:
  ema_fast: 9
  ema_slow: 21
  rsi_period: 14
  rsi_long_min: 30.0
  rsi_long_max: 65.0
  rsi_short_min: 35.0
  rsi_short_max: 70.0
  atr_stop_multiplier: 2.0
  reward_risk_ratio: "1.5"
  max_trades_per_day: 4
  max_entry_time: "15:00"
  allow_short: true

# RSI(2) Connors Mean Reversion Strategy — DAILY timeframe
# Classic Connors RSI(2): buy oversold dips in uptrends, sell overbought rallies in downtrends
# Evaluates once/day at 16:00 ET, holds overnight, exits on RSI recovery
rsi2_connors:
  enabled: true
  rsi_period: 2                  # Standard Connors RSI period
  rsi_entry_threshold: 10        # LONG entry when RSI(2) < 10 (deeply oversold)
  rsi_exit_threshold: 70         # LONG exit when RSI(2) > 70 (mean reverted)
  rsi_short_entry_threshold: 95  # SHORT entry when RSI(2) > 95 (overbought in downtrend)
  rsi_short_exit_threshold: 30   # SHORT exit when RSI(2) < 30 (mean reverted)
  sma_period: 200                # Trend filter: LONG needs price > SMA, SHORT needs price < SMA
  max_hold_days: 7               # Force exit after 7 trading days
  stop_points: 20                # Catastrophe stop: 20 pts = $100 on MES (both sides)
  direction: "both"              # Long + short mean reversion

# RSI Mean Reversion (Intraday) — secondary strategy
# Runs alongside the primary strategy on 5-min bars.
# Does NOT trade if primary strategy has an open position.
# Backtest: PF 1.27, ~1.9 trades/day
rsi_mean_reversion:
  enabled: true
  rsi_period: 14
  rsi_entry_long: 25
  rsi_entry_short: 75
  rsi_exit: 50
  stop_points: 6             # 6 pts = $30 per MES contract
  max_daily_trades: 4
  start_time: "10:00"        # ET - skip opening volatility
  end_time: "15:30"          # ET - skip close

# Notifications
notifications:
  enabled: true
  ntfy_topic: "${NTFY_TOPIC_IB:}"

# ATR Filter (skip extreme volatility days)
atr_filter:
  enabled: true
  lookback_days: 20            # Rolling window of daily ATR values
  low_percentile: 20.0         # Skip if ATR below this percentile
  high_percentile: 80.0        # Skip if ATR above this percentile

# Regime Detection (observation-only, does not block trades)
regime:
  enabled: true
  atr_lookback: 20
  price_window: 10
  high_vol_multiplier: 1.5
  low_vol_multiplier: 0.5

# Paper-Trading Scorecard
scorecard:
  enabled: true
  halt_dd_usd: 400
  halt_5s_loss_usd: 150
  candidate_pf: 1.2
  candidate_min_trades: 30
  candidate_max_dd: 300
  candidate_min_wr: 35.0

# Logging
logging:
  level: "INFO"
  file: "logs/ib_bot.log"
