openapi: 3.0.3
info:
  title: Trading System Health & Readiness API
  description: |
    Health check and readiness endpoints for monitoring system status.
    These endpoints support production deployment requirements (FR-031, FR-032).
  version: 1.0.0
  contact:
    name: Trading System API

servers:
  - url: http://localhost:5611/api
    description: Local development
  - url: https://oaa.finan.club/api
    description: Production

paths:
  /health:
    get:
      summary: Health Check
      description: |
        Returns system health status for monitoring tools (Docker health checks, load balancers).

        **Requirements**: FR-031

        **Returns**:
        - `status`: "ok" (system running), "degraded" (partial failure), "down" (critical failure)
        - `uptime`: Seconds since application started
        - `last_sync_time`: ISO 8601 timestamp of last successful Hyperliquid sync
        - `sync_status`: "ok" (recent sync successful), "stale" (no sync > 2 minutes), "failing" (3+ consecutive failures)

        **Response Codes**:
        - 200: System healthy or degraded (still serving requests)
        - 503: System down (critical failure, cannot serve requests)
      operationId: getHealth
      tags:
        - Health
      responses:
        '200':
          description: System is healthy or degraded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  summary: System fully operational
                  value:
                    status: ok
                    uptime: 86400
                    last_sync_time: "2025-10-31T12:30:45Z"
                    sync_status: ok
                    message: "All systems operational"
                degraded:
                  summary: System operating with issues
                  value:
                    status: degraded
                    uptime: 3600
                    last_sync_time: "2025-10-31T12:25:00Z"
                    sync_status: stale
                    message: "Sync delayed: last successful sync 5 minutes ago"
        '503':
          description: System is down (critical failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: down
                uptime: 120
                last_sync_time: null
                sync_status: failing
                message: "Database connection lost"

  /ready:
    get:
      summary: Readiness Check
      description: |
        Returns readiness status for Kubernetes/Docker orchestration.

        **Requirements**: FR-032

        **Checks**:
        - Database connectivity (can execute simple query)
        - Hyperliquid API reachability (can fetch user state)
        - Required environment variables present (HYPERLIQUID_PRIVATE_KEY, etc.)

        **Response Codes**:
        - 200: System ready to accept traffic
        - 503: System not ready (startup incomplete, dependencies unavailable)

        **Use Case**: Load balancers should route traffic only if this returns 200.
      operationId: getReadiness
      tags:
        - Health
      responses:
        '200':
          description: System is ready to serve requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
              example:
                ready: true
                checks:
                  database: ok
                  hyperliquid_api: ok
                  environment: ok
                message: "System ready"
        '503':
          description: System is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
              example:
                ready: false
                checks:
                  database: ok
                  hyperliquid_api: failed
                  environment: ok
                message: "Hyperliquid API unreachable (connection timeout)"

  /metrics:
    get:
      summary: Prometheus Metrics
      description: |
        Returns metrics in Prometheus format for monitoring integration.

        **Requirements**: FR-051

        **Metrics Exposed**:
        - `trading_system_uptime_seconds`: Application uptime
        - `trading_system_sync_success_total`: Count of successful syncs
        - `trading_system_sync_failure_total`: Count of failed syncs
        - `trading_system_sync_duration_seconds`: Histogram of sync durations
        - `trading_system_api_requests_total`: Count of API requests by endpoint
        - `trading_system_api_request_duration_seconds`: Histogram of API response times
        - `trading_system_db_pool_size`: Current database connection pool size
        - `trading_system_db_pool_available`: Available database connections

        **Response Format**: Prometheus text exposition format
      operationId: getMetrics
      tags:
        - Monitoring
      responses:
        '200':
          description: Metrics in Prometheus format
          content:
            text/plain:
              schema:
                type: string
              example: |
                # HELP trading_system_uptime_seconds Application uptime in seconds
                # TYPE trading_system_uptime_seconds gauge
                trading_system_uptime_seconds 86400

                # HELP trading_system_sync_success_total Count of successful syncs
                # TYPE trading_system_sync_success_total counter
                trading_system_sync_success_total 2880

                # HELP trading_system_sync_failure_total Count of failed syncs
                # TYPE trading_system_sync_failure_total counter
                trading_system_sync_failure_total 12

                # HELP trading_system_sync_duration_seconds Sync duration histogram
                # TYPE trading_system_sync_duration_seconds histogram
                trading_system_sync_duration_seconds_bucket{le="1.0"} 2800
                trading_system_sync_duration_seconds_bucket{le="5.0"} 2880
                trading_system_sync_duration_seconds_bucket{le="+Inf"} 2880
                trading_system_sync_duration_seconds_sum 7200
                trading_system_sync_duration_seconds_count 2880

components:
  schemas:
    HealthResponse:
      type: object
      required:
        - status
        - uptime
        - sync_status
        - message
      properties:
        status:
          type: string
          enum: [ok, degraded, down]
          description: Overall system health status
        uptime:
          type: integer
          format: int64
          description: Seconds since application started
          minimum: 0
        last_sync_time:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of last successful sync (null if never synced)
        sync_status:
          type: string
          enum: [ok, stale, failing]
          description: |
            Sync health status:
            - ok: Last sync within 2 minutes and successful
            - stale: No successful sync in 2-5 minutes
            - failing: 3+ consecutive failures or no sync in 5+ minutes
        message:
          type: string
          description: Human-readable status message
          example: "All systems operational"

    ReadinessResponse:
      type: object
      required:
        - ready
        - checks
        - message
      properties:
        ready:
          type: boolean
          description: True if system is ready to accept traffic
        checks:
          type: object
          required:
            - database
            - hyperliquid_api
            - environment
          properties:
            database:
              type: string
              enum: [ok, failed]
              description: Database connectivity status
            hyperliquid_api:
              type: string
              enum: [ok, failed]
              description: Hyperliquid API reachability status
            environment:
              type: string
              enum: [ok, failed]
              description: Required environment variables status
        message:
          type: string
          description: Human-readable readiness message
          example: "System ready"

tags:
  - name: Health
    description: Health and readiness endpoints
  - name: Monitoring
    description: Metrics and observability endpoints
