openapi: 3.0.3
info:
  title: Hyperliquid Synchronization API
  description: |
    API endpoints for managing synchronization between local database and Hyperliquid (source of truth).
    These endpoints support manual sync triggers and sync status monitoring.
  version: 1.0.0
  contact:
    name: Trading System API

servers:
  - url: http://localhost:5611/api
    description: Local development
  - url: https://oaa.finan.club/api
    description: Production

paths:
  /sync/status:
    get:
      summary: Get Sync Status
      description: |
        Returns current synchronization status for all active accounts.

        **Requirements**: User Story 1 (Reliable Data Synchronization)

        **Returns**:
        - Last sync time for each account
        - Sync success/failure status
        - Data freshness indicators
        - Consecutive failure count (for circuit breaker monitoring)

        **Use Case**: Frontend displays data staleness indicator, monitoring dashboards track sync health.
      operationId: getSyncStatus
      tags:
        - Synchronization
      responses:
        '200':
          description: Sync status for all accounts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncStatusResponse'
              example:
                accounts:
                  - account_id: 1
                    account_name: "DeepSeek"
                    last_sync_time: "2025-10-31T12:30:45Z"
                    last_sync_duration_ms: 1234
                    sync_status: "success"
                    consecutive_failures: 0
                    data_freshness_seconds: 15
                    next_sync_estimated: "2025-10-31T12:31:15Z"
                overall_status: "healthy"
                message: "All accounts syncing normally"

  /sync/account/{account_id}:
    post:
      summary: Trigger Manual Sync
      description: |
        Manually triggers synchronization for a specific account.

        **Requirements**: FR-004, FR-005, FR-006, FR-007, FR-008

        **Behavior**:
        - Fetches latest data from Hyperliquid API
        - Updates account balance (current_cash, frozen_cash)
        - Clears and recreates positions (Hyperliquid-wins policy)
        - Syncs last 100 fills to orders and trades
        - All operations in single atomic transaction

        **Response Codes**:
        - 200: Sync successful
        - 404: Account not found
        - 503: Sync failed (Hyperliquid API unreachable, database error)

        **Use Case**: Frontend "Refresh" button, recovery from sync failures.
      operationId: syncAccount
      tags:
        - Synchronization
      parameters:
        - name: account_id
          in: path
          required: true
          description: Account ID to synchronize
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Sync completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResultResponse'
              example:
                success: true
                account_id: 1
                account_name: "DeepSeek"
                sync_duration_ms: 1456
                synced_at: "2025-10-31T12:35:00Z"
                data:
                  balance:
                    available: 52.34
                    frozen: 0.00
                    total_equity: 52.34
                  positions_count: 1
                  new_orders_count: 0
                  new_trades_count: 0
                message: "Account synced successfully"
        '404':
          description: Account not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error: "Account not found"
                error_code: "ACCOUNT_NOT_FOUND"
        '503':
          description: Sync failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncResultResponse'
              example:
                success: false
                account_id: 1
                account_name: "DeepSeek"
                sync_duration_ms: 5000
                error: "Hyperliquid API timeout"
                error_code: "SYNC_API_TIMEOUT"
                message: "Sync failed: Hyperliquid API did not respond within 5 seconds"

  /sync/all:
    post:
      summary: Trigger Sync for All Accounts
      description: |
        Manually triggers synchronization for all active accounts.

        **Requirements**: Same as single account sync (FR-004 to FR-008)

        **Behavior**:
        - Iterates through all active accounts
        - Syncs each account independently
        - Continues even if individual account sync fails
        - Returns aggregated results

        **Use Case**: Admin dashboard "Sync All" button, scheduled maintenance.
      operationId: syncAllAccounts
      tags:
        - Synchronization
      responses:
        '200':
          description: Sync completed for all accounts (partial failures possible)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncAllResultResponse'
              example:
                success: true
                total_accounts: 1
                synced_accounts: 1
                failed_accounts: 0
                sync_duration_ms: 1456
                results:
                  - account_id: 1
                    account_name: "DeepSeek"
                    success: true
                    message: "Account synced successfully"
                message: "All accounts synced successfully"

components:
  schemas:
    SyncStatusResponse:
      type: object
      required:
        - accounts
        - overall_status
        - message
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/AccountSyncStatus'
        overall_status:
          type: string
          enum: [healthy, degraded, failing]
          description: |
            Overall sync health:
            - healthy: All accounts syncing successfully
            - degraded: Some accounts have stale data (>2 minutes)
            - failing: One or more accounts have 3+ consecutive failures
        message:
          type: string
          description: Human-readable status summary

    AccountSyncStatus:
      type: object
      required:
        - account_id
        - account_name
        - sync_status
        - consecutive_failures
      properties:
        account_id:
          type: integer
          description: Account identifier
        account_name:
          type: string
          description: Account display name
        last_sync_time:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of last sync attempt (null if never synced)
        last_sync_duration_ms:
          type: integer
          nullable: true
          description: Duration of last sync in milliseconds
        sync_status:
          type: string
          enum: [success, failed, pending]
          description: Status of last sync attempt
        consecutive_failures:
          type: integer
          minimum: 0
          description: Count of consecutive sync failures (0 if last sync succeeded)
        data_freshness_seconds:
          type: integer
          nullable: true
          description: Seconds since last successful sync (null if never synced)
        next_sync_estimated:
          type: string
          format: date-time
          nullable: true
          description: Estimated time of next automatic sync (30s interval)

    SyncResultResponse:
      type: object
      required:
        - success
        - account_id
        - account_name
        - message
      properties:
        success:
          type: boolean
          description: True if sync completed successfully
        account_id:
          type: integer
          description: Account identifier
        account_name:
          type: string
          description: Account display name
        sync_duration_ms:
          type: integer
          description: Sync operation duration in milliseconds
        synced_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp when sync completed
        data:
          type: object
          nullable: true
          description: Synced data summary (only present if success=true)
          properties:
            balance:
              type: object
              properties:
                available:
                  type: number
                  format: double
                  description: Available balance (current_cash)
                frozen:
                  type: number
                  format: double
                  description: Frozen balance (frozen_cash)
                total_equity:
                  type: number
                  format: double
                  description: Total equity (available + frozen)
            positions_count:
              type: integer
              description: Number of open positions after sync
            new_orders_count:
              type: integer
              description: Number of new orders created from fills
            new_trades_count:
              type: integer
              description: Number of new trades created from fills
        error:
          type: string
          nullable: true
          description: Error message (only present if success=false)
        error_code:
          type: string
          nullable: true
          description: Machine-readable error code
          enum:
            - SYNC_API_TIMEOUT
            - SYNC_API_ERROR
            - SYNC_DB_ERROR
            - SYNC_RATE_LIMIT
            - ACCOUNT_NOT_FOUND
        message:
          type: string
          description: Human-readable result message

    SyncAllResultResponse:
      type: object
      required:
        - success
        - total_accounts
        - synced_accounts
        - failed_accounts
        - results
        - message
      properties:
        success:
          type: boolean
          description: True if all accounts synced successfully
        total_accounts:
          type: integer
          description: Total number of active accounts
        synced_accounts:
          type: integer
          description: Number of accounts synced successfully
        failed_accounts:
          type: integer
          description: Number of accounts that failed to sync
        sync_duration_ms:
          type: integer
          description: Total duration for all sync operations
        results:
          type: array
          items:
            type: object
            required:
              - account_id
              - account_name
              - success
              - message
            properties:
              account_id:
                type: integer
              account_name:
                type: string
              success:
                type: boolean
              message:
                type: string
              error_code:
                type: string
                nullable: true
        message:
          type: string
          description: Human-readable summary

    ErrorResponse:
      type: object
      required:
        - success
        - error
        - error_code
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          description: Human-readable error message
        error_code:
          type: string
          description: Machine-readable error code

tags:
  - name: Synchronization
    description: Hyperliquid synchronization management
