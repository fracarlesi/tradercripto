# Trading Symbols Configuration
# Define which symbols to trade and their specific limits

symbols:
  BTC:
    enabled: true
    max_leverage: 4.0
    max_position_pct: 0.50  # Max 50% of equity in BTC
    min_size: 0.0001
    size_decimals: 4
    price_decimals: 1

  ETH:
    enabled: true
    max_leverage: 4.0
    max_position_pct: 0.40  # Max 40% of equity in ETH
    min_size: 0.001
    size_decimals: 3
    price_decimals: 2

  SOL:
    enabled: true
    max_leverage: 3.0  # Lower leverage for SOL (more volatile)
    max_position_pct: 0.30  # Max 30% of equity in SOL
    min_size: 0.01
    size_decimals: 2
    price_decimals: 3

  # Additional symbols (disabled by default)
  DOGE:
    enabled: false
    max_leverage: 2.0
    max_position_pct: 0.20
    min_size: 1.0
    size_decimals: 0
    price_decimals: 5

  AVAX:
    enabled: false
    max_leverage: 3.0
    max_position_pct: 0.25
    min_size: 0.1
    size_decimals: 1
    price_decimals: 3
