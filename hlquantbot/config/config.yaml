# HLQuantBot Configuration - Phase C (HFT)
# This file contains strategy parameters and risk limits
# API keys should ONLY be in .env, never here

# =============================================================================
# RISK MANAGEMENT - OTTIMIZZATO PER P&L (da specifica consigli.md)
# Target: +20-40% mensile, DD max 30-40%
# =============================================================================
risk:
  # Portfolio level limits (AGGIORNATI per ottimizzazione P&L)
  max_portfolio_leverage: 8.0  # Aumentato da 4.0 per maggiore esposizione
  max_daily_loss_pct: 0.10  # 10% - triggers hard circuit breaker
  max_total_drawdown_pct: 0.35  # 35% - ridotto per protezione capitale (era 50%)

  # Per trade limits (AGGIORNATI per P&L optimization)
  max_risk_per_trade_pct: 0.012  # 1.2% per trade (aumentato da 0.7%)
  default_leverage: 5.0  # Aumentato da 3.0
  max_position_leverage: 20.0  # Mantenuto per HFT

  # Per asset limits (AGGIORNATO)
  max_exposure_per_asset_pct: 0.65  # 65% (aumentato da 40%)

  # Position limits
  max_open_positions: 15  # Max concurrent positions

  # Global TP/SL constraints (NUOVO - fee-aware)
  min_tp_pct: 0.0035  # 0.35% minimo TP
  max_sl_pct: 0.0020  # 0.20% massimo SL
  min_rr_ratio: 1.5  # Risk:Reward minimo
  maker_fee_pct: 0.0002  # 0.02% maker fee
  taker_fee_pct: 0.0005  # 0.05% taker fee
  min_net_profit_pct: 0.002  # 0.20% profitto netto minimo dopo fee

  # Circuit breaker (hard stop - exits process)
  circuit_breaker_enabled: true
  auto_restart_after_circuit_breaker: false  # MUST be manual

  # Circuit Breaker - NUOVO MODELLO 4 LIVELLI (da specifica)
  circuit_breaker_levels:
    # Level 1: 5 min window, -1.5% DD -> pausa 5 min
    level_1:
      window_seconds: 300  # 5 minuti
      max_drawdown_pct: 0.015  # 1.5%
      cooldown_seconds: 300  # 5 minuti pausa
      action: pause
    # Level 2: 30 min window, -4% DD -> pausa 30 min
    level_2:
      window_seconds: 1800  # 30 minuti
      max_drawdown_pct: 0.04  # 4%
      cooldown_seconds: 1800  # 30 minuti pausa
      action: pause
    # Level 3: 4 ore window, -10% DD -> stop fino giorno successivo
    level_3:
      window_seconds: 14400  # 4 ore
      max_drawdown_pct: 0.10  # 10%
      cooldown_seconds: 86400  # fino a giorno successivo
      action: stop_trading
    # Level 4: totale, -35% DD -> hard stop
    level_4:
      window_seconds: 0  # totale (dall'inizio)
      max_drawdown_pct: 0.35  # 35%
      cooldown_seconds: 0  # permanente
      action: hard_stop

  # Temporal Kill-Switch (legacy - mantenuto per compatibilità)
  temporal_risk:
    enabled: true
    # Level 1: Rapid loss (30s window)
    level_1:
      window_seconds: 30
      max_drawdown_pct: 0.007  # 0.7%
      cooldown_seconds: 900  # 15 minutes
    # Level 2: Medium-term loss (10 min window)
    level_2:
      window_seconds: 600
      max_drawdown_pct: 0.02  # 2%
      cooldown_seconds: 3600  # 1 hour
    # Level 3: Hourly loss (1h window)
    level_3:
      window_seconds: 3600
      max_drawdown_pct: 0.045  # 4.5%
      cooldown_seconds: 21600  # 6 hours

# =============================================================================
# LEGACY STRATEGIES (Disabled - to be removed)
# =============================================================================
strategies:
  funding_bias:
    enabled: false  # DISABLED for Phase C
    allocation_pct: 0.30
    max_positions: 1
    symbols:
      - BTC
      - ETH
      - SOL
    funding_threshold_high: 0.0003
    funding_threshold_low: -0.0003
    predicted_funding_weight: 0.3
    hold_through_funding: true
    max_hold_hours: 24
    min_open_interest_usd: 10000000
    max_volatility_atr_pct: 0.03

  liquidation_cluster:
    enabled: false  # DISABLED for Phase C
    allocation_pct: 0.40
    max_positions: 1
    symbols:
      - BTC
      - ETH
      - SOL
    oi_change_threshold_pct: 0.05
    oi_lookback_bars: 12
    swing_lookback_bars: 20
    support_resistance_touches: 2
    level_proximity_pct: 0.005
    min_rr_ratio: 2.0
    volume_surge_multiplier: 1.5
    stop_loss_atr_multiplier: 1.0
    take_profit_atr_multiplier: 2.5

  volatility_expansion:
    enabled: false  # DISABLED for Phase C
    allocation_pct: 0.30
    max_positions: 1
    symbols:
      - BTC
      - ETH
      - SOL
    bb_period: 20
    bb_std: 2.0
    bb_width_threshold: 0.02
    atr_period: 14
    atr_percentile_threshold: 20
    breakout_atr_multiplier: 0.5
    volume_confirmation_multiplier: 1.3
    stop_loss_atr_multiplier: 0.75
    take_profit_range_multiplier: 2.0
    active_hours_utc: [13, 14, 15, 16, 17, 18, 19, 20, 21]

  # ===========================================================================
  # HFT STRATEGIES (Phase C - Active)
  # ===========================================================================
  hft:
    # -------------------------------------------------------------------------
    # MMR-HFT: Micro Mean Reversion (Context Pack 2.0)
    # RESTRIZIONE REGIME: Attivo SOLO in range_bound o low_volatility
    # -------------------------------------------------------------------------
    mmr_hft:
      enabled: true
      symbols: [BTC, ETH, SOL, DOGE, AVAX, LINK, ARB, XRP, ADA, APT, SUI, INJ]
      allocation_pct: 0.15
      max_positions: 3
      signal_cooldown_seconds: 1

      # Regime restriction (Context Pack 2.0)
      # La strategia è completamente disabilitata se regime != range_bound/low_volatility
      allowed_regimes: [range_bound, low_volatility]

      # Timeframe
      timeframe_seconds: 5
      primary_timeframe: M5

      # Mean reversion parameters (Context Pack 2.0 - CONSERVATIVE)
      # Aumentati per ridurre falsi segnali in ranging markets
      deviation_threshold_pct: 0.0005  # 0.05% from VWAP (AUMENTATO da 0.02%)
      max_deviation_pct: 0.005         # 0.5% max deviation

      # Risk/Reward (Context Pack 2.0)
      # TP >= 0.35%, SL <= 0.15%, RR >= 1.5
      take_profit_pct: 0.0035   # 0.35% minimo TP
      stop_loss_pct: 0.0015     # 0.15% massimo SL (RR = 2.33)

      # Leverage
      default_leverage: 15.0
      max_leverage: 20.0

      # Position sizing
      max_position_pct: 0.01  # 1% per trade

      # HFT settings
      order_timeout_seconds: 5
      max_position_hold_seconds: 60
      min_signal_interval_ms: 500  # 0.5 seconds

    # -------------------------------------------------------------------------
    # Micro-Breakout 2.0: Compression detection + ATR-based TP/SL
    # AGGIORNATO con logica specifica per RR >= 2 (da specifica)
    # -------------------------------------------------------------------------
    micro_breakout:
      enabled: true
      symbols: [BTC, ETH, SOL, DOGE, AVAX, LINK, ARB, XRP, ADA, APT, SUI, INJ]
      allocation_pct: 0.20
      max_positions: 3
      signal_cooldown_seconds: 1

      # Timeframe
      timeframe_seconds: 15
      consolidation_bars: 30  # Aumentato per compression detection

      # Compression detection (NUOVO - da specifica)
      compression_ratio_threshold: 0.7  # Trigger quando ratio < 0.7
      compression_ema_period: 30  # EMA del range per calcolo ratio

      # Breakout validation (AGGIORNATO - da specifica)
      volume_surge_multiplier: 2.0  # 2x media 20 barre (era 1.5)
      oi_change_threshold_pct: 0.05  # 5% ΔOI (era 1%)

      # ATR-based TP/SL (NUOVO - da specifica)
      atr_period: 5
      atr_tp_multiplier: 1.2  # TP = 1.2 × ATR_5
      atr_sl_multiplier: 0.6  # SL = 0.6 × ATR_5 (RR ≈ 2)

      # Fallback TP/SL (se ATR non disponibile)
      take_profit_pct: 0.004  # 0.4%
      stop_loss_pct: 0.002  # 0.2%

      # Leverage
      default_leverage: 10.0
      max_leverage: 15.0

      # Position sizing
      max_position_pct: 0.02  # 2% per trade

      # HFT settings
      order_timeout_seconds: 5
      max_position_hold_seconds: 60
      min_signal_interval_ms: 500

    # -------------------------------------------------------------------------
    # Pair Trading: Long strongest / Short weakest
    # AGGIORNATO: Priorità bassa, SOLO in range_bound (da specifica)
    # -------------------------------------------------------------------------
    pair_trading:
      enabled: true
      symbols: [BTC, ETH, SOL, DOGE, AVAX, LINK, ARB, XRP, ADA, APT, SUI, INJ]
      allocation_pct: 0.20  # Ridotto - priorità bassa (era 0.30)
      max_positions: 4  # 2 pairs x 2 legs
      signal_cooldown_seconds: 5

      # Regime restriction (NUOVO - da specifica)
      allowed_regimes: [range_bound]
      priority: low  # Priorità bassa rispetto altre strategie

      # Pairs to trade
      pairs:
        - [BTC, ETH]
        - [ETH, SOL]

      # Correlation/spread parameters
      lookback_seconds: 300  # 5 min
      zscore_entry_threshold: 1.5
      zscore_exit_threshold: 0.5
      rebalance_interval_seconds: 60

      # Risk/Reward - AGGIORNATI per rispettare vincoli globali
      take_profit_spread_pct: 0.0035  # 0.35% minimo (era 0.2%)
      stop_loss_spread_pct: 0.002  # 0.2% max (era 0.3%)

      # Leverage (per leg)
      default_leverage: 15.0
      max_leverage: 20.0

      # Position sizing (per leg)
      max_position_pct: 0.015  # 1.5% per leg

      # HFT settings
      order_timeout_seconds: 5
      max_position_hold_seconds: 300  # 5 min max hold
      min_signal_interval_ms: 10000  # 10 seconds - pair trading is slower

    # -------------------------------------------------------------------------
    # Liquidation Sniping 2.0: CORE STRATEGY (da specifica)
    # Obiettivo: generare la maggior parte del P&L in giorni alta volatilità
    # -------------------------------------------------------------------------
    # SPEC: Triple confirmation required (OI + Price + Volume)
    # SPEC: TP 0.40-0.60%, SL max 0.20%, MIN_RR 1.5, Net profit >= 0.20%
    liquidation_sniping:
      enabled: true
      symbols: [BTC, ETH, SOL, DOGE, AVAX, LINK, ARB, XRP, ADA, APT, SUI, INJ]  # Tutte le major
      allocation_pct: 0.25  # CORE STRATEGY (era 0.15)
      max_positions: 3  # Aumentato (era 2)
      signal_cooldown_seconds: 2

      # ========================================================================
      # DETECTION PARAMETERS (SPEC 2.0 - Triple Confirmation)
      # ========================================================================
      # 1. OI Spike: ΔOI >= ±10% su finestra 30-60s
      oi_spike_threshold_pct: 0.10  # 10% ΔOI (era 2%)
      oi_spike_window_seconds: 60

      # 2. Price Spike: >= ±0.35% in < 60s
      price_spike_threshold_pct: 0.0035  # 0.35% (era 0.5%)

      # 3. Volume Spike: >= 1.5x media ultimi 20 bars
      volume_spike_threshold_pct: 1.5  # 1.5x (era 1.2x)

      # Entry timing
      entry_delay_ms: 100

      # ========================================================================
      # RISK/REWARD (SPEC 2.0)
      # ========================================================================
      # NOTA: TP/SL sono calcolati DINAMICAMENTE nel codice:
      #  - TP: 0.40%-0.60% (scalato con cascade strength)
      #  - SL: fisso 0.20% (per ottimizzare R:R)
      #  - Validazione: MIN_RR >= 1.5, Net profit >= 0.20% dopo fees
      # Questi valori sono OVERRIDDEN dalla logica interna
      take_profit_pct: 0.005  # Placeholder (dynamic: 0.40%-0.60%)
      stop_loss_pct: 0.002  # 0.20% MAX

      # ========================================================================
      # LEVERAGE & POSITION SIZING
      # ========================================================================
      default_leverage: 25.0  # Aumentato (era 20.0) - CORE strategy
      max_leverage: 30.0  # Aumentato (era 25.0)

      # Position sizing: più aggressivo per CORE strategy
      max_position_pct: 0.015  # 1.5% per trade (era 1%)

      # ========================================================================
      # HFT SETTINGS
      # ========================================================================
      order_timeout_seconds: 5
      max_position_hold_seconds: 45  # Aumentato da 30s per allow TP hit
      min_signal_interval_ms: 1000  # 1s (era 500ms) - più selettivo

    # -------------------------------------------------------------------------
    # Momentum Scalping: Booster Strategy (Context Pack 2.0)
    # RESTRIZIONE REGIME: Attivo SOLO in trend_up / trend_down
    # -------------------------------------------------------------------------
    momentum_scalping:
      enabled: true
      symbols: [BTC, ETH, SOL, DOGE, AVAX, LINK, ARB, XRP, ADA, APT, SUI, INJ]
      allocation_pct: 0.20
      max_positions: 3
      signal_cooldown_seconds: 1

      # Regime restriction (Context Pack 2.0)
      # La strategia è completamente disabilitata se regime != trend_up/trend_down
      allowed_regimes: [trend_up, trend_down]

      # Trend detection parameters (Context Pack 2.0)
      ema_fast: 20          # EMA20
      ema_slow: 50          # EMA50
      min_rsi_up: 60        # Long: RSI > 60
      max_rsi_down: 40      # Short: RSI < 40
      min_volume_ratio: 1.2 # Volume >= 1.2x average

      # Risk/Reward (Context Pack 2.0)
      # TP: 0.35-0.45%, SL: 0.15-0.20%, Min RR: 1.5
      # Fee-aware: TP_net >= 0.20% after fees (0.04% roundtrip)
      take_profit_pct: 0.004   # 0.40% (nel range 0.35-0.45%)
      stop_loss_pct: 0.0018    # 0.18% (nel range 0.15-0.20%, RR = 2.22)

      # Leverage
      default_leverage: 10.0
      max_leverage: 15.0

      # Position sizing
      max_position_pct: 0.015  # 1.5% per trade

      # HFT settings
      order_timeout_seconds: 5
      max_position_hold_seconds: 120  # 2 min max hold
      min_signal_interval_ms: 1000

# =============================================================================
# TELEGRAM ALERTING
# =============================================================================
telegram:
  enabled: false  # Set to true and add tokens in .env
  alert_on_trade: true
  alert_on_error: true
  alert_on_daily_summary: true
  alert_on_circuit_breaker: true

# =============================================================================
# AI LAYER (Aggression Controller) - Using DeepSeek V3.2-Speciale
# =============================================================================
openai:
  enabled: true
  model: deepseek-chat
  base_url: https://api.deepseek.com
  regime_detection_interval_minutes: 5  # More frequent for HFT
  param_tuning_interval_hours: 6  # More frequent tuning
  max_tokens: 4000
  temperature: 0.3

# =============================================================================
# AGGRESSION CONTROLLER - 5 LIVELLI (da specifica consigli.md)
# =============================================================================
aggression:
  enabled: true

  # Livelli di aggressività con moltiplicatori rischio/leva
  levels:
    paused:
      risk_mult: 0.0
      leverage_mult: 0.0
    conservative:
      risk_mult: 0.5
      leverage_mult: 0.5
    normal:
      risk_mult: 1.0
      leverage_mult: 1.0
    aggressive:
      risk_mult: 1.5
      leverage_mult: 1.5
    very_aggressive:
      risk_mult: 2.0
      leverage_mult: 2.0

  # Trigger per cambio livello (da specifica)
  triggers:
    win_rate_threshold: 0.58  # 58% win rate -> +1 livello
    win_rate_lookback_trades: 100  # Ultimi 100 trade
    daily_loss_threshold: 0.02  # -2% P&L daily -> -1 livello
    cb_downgrade_to: conservative  # Se CB L2/L3 attivato -> CONSERVATIVE
    trend_upgrade_max: aggressive  # In trend -> +1 (max AGGRESSIVE)

