# HLQuantBot Configuration - Phase C (HFT)
# This file contains strategy parameters and risk limits
# API keys should ONLY be in .env, never here

# =============================================================================
# RISK MANAGEMENT (Aggressive for HFT)
# =============================================================================
risk:
  # Portfolio level limits
  max_portfolio_leverage: 4.0  # Reduced from 5.0 for HFT safety
  max_daily_loss_pct: 0.10  # 10% - triggers hard circuit breaker (exit process)
  max_total_drawdown_pct: 0.50  # 50% - full stop, manual restart required

  # Per trade limits (HFT-adjusted)
  max_risk_per_trade_pct: 0.007  # 0.7% of equity per trade (down from 2%)
  default_leverage: 3.0
  max_position_leverage: 20.0  # Higher for HFT micro-positions

  # Per asset limits
  max_exposure_per_asset_pct: 0.40  # 40% of equity max in single asset

  # Position limits
  max_open_positions: 15  # Max concurrent positions

  # Circuit breaker (hard stop - exits process)
  circuit_breaker_enabled: true
  auto_restart_after_circuit_breaker: false  # MUST be manual

  # Temporal Kill-Switch (soft stop - cooldown then resume)
  temporal_risk:
    enabled: true
    # Level 1: Rapid loss (30s window)
    level_1:
      window_seconds: 30
      max_drawdown_pct: 0.007  # 0.7%
      cooldown_seconds: 900  # 15 minutes
    # Level 2: Medium-term loss (10 min window)
    level_2:
      window_seconds: 600
      max_drawdown_pct: 0.02  # 2%
      cooldown_seconds: 3600  # 1 hour
    # Level 3: Hourly loss (1h window)
    level_3:
      window_seconds: 3600
      max_drawdown_pct: 0.045  # 4.5%
      cooldown_seconds: 21600  # 6 hours

# =============================================================================
# LEGACY STRATEGIES (Disabled - to be removed)
# =============================================================================
strategies:
  funding_bias:
    enabled: false  # DISABLED for Phase C
    allocation_pct: 0.30
    max_positions: 1
    symbols:
      - BTC
      - ETH
      - SOL
    funding_threshold_high: 0.0003
    funding_threshold_low: -0.0003
    predicted_funding_weight: 0.3
    hold_through_funding: true
    max_hold_hours: 24
    min_open_interest_usd: 10000000
    max_volatility_atr_pct: 0.03

  liquidation_cluster:
    enabled: false  # DISABLED for Phase C
    allocation_pct: 0.40
    max_positions: 1
    symbols:
      - BTC
      - ETH
      - SOL
    oi_change_threshold_pct: 0.05
    oi_lookback_bars: 12
    swing_lookback_bars: 20
    support_resistance_touches: 2
    level_proximity_pct: 0.005
    min_rr_ratio: 2.0
    volume_surge_multiplier: 1.5
    stop_loss_atr_multiplier: 1.0
    take_profit_atr_multiplier: 2.5

  volatility_expansion:
    enabled: false  # DISABLED for Phase C
    allocation_pct: 0.30
    max_positions: 1
    symbols:
      - BTC
      - ETH
      - SOL
    bb_period: 20
    bb_std: 2.0
    bb_width_threshold: 0.02
    atr_period: 14
    atr_percentile_threshold: 20
    breakout_atr_multiplier: 0.5
    volume_confirmation_multiplier: 1.3
    stop_loss_atr_multiplier: 0.75
    take_profit_range_multiplier: 2.0
    active_hours_utc: [13, 14, 15, 16, 17, 18, 19, 20, 21]

  # ===========================================================================
  # HFT STRATEGIES (Phase C - Active)
  # ===========================================================================
  hft:
    # -------------------------------------------------------------------------
    # MMR-HFT: Micro Mean Reversion (1-5s timeframe)
    # -------------------------------------------------------------------------
    mmr_hft:
      enabled: true
      symbols: [BTC, ETH]
      allocation_pct: 0.15
      max_positions: 3
      signal_cooldown_seconds: 1

      # Timeframe
      timeframe_seconds: 5

      # Mean reversion parameters - PRODUCTION
      deviation_threshold_pct: 0.001  # 0.1% from VWAP
      max_deviation_pct: 0.003  # 0.3% max deviation

      # Risk/Reward
      take_profit_pct: 0.002  # 0.2%
      stop_loss_pct: 0.003  # 0.3%

      # Leverage
      default_leverage: 15.0
      max_leverage: 20.0

      # Position sizing
      max_position_pct: 0.01  # 1% per trade

      # HFT settings
      order_timeout_seconds: 5
      max_position_hold_seconds: 60
      min_signal_interval_ms: 5000  # 5 seconds - prevent order spam

    # -------------------------------------------------------------------------
    # Micro-Breakout: 3-15s breakout trading
    # -------------------------------------------------------------------------
    micro_breakout:
      enabled: true
      symbols: [BTC, ETH, SOL]
      allocation_pct: 0.20
      max_positions: 3
      signal_cooldown_seconds: 1

      # Timeframe
      timeframe_seconds: 15
      consolidation_bars: 10

      # Breakout detection - PRODUCTION
      range_threshold_pct: 0.002  # 0.2% range
      breakout_threshold_pct: 0.001  # 0.1% beyond range
      volume_surge_multiplier: 1.5  # Volume confirmation

      # Risk/Reward
      take_profit_pct: 0.003  # 0.3%
      stop_loss_pct: 0.004  # 0.4%

      # Leverage
      default_leverage: 10.0
      max_leverage: 15.0

      # Position sizing
      max_position_pct: 0.02  # 2% per trade

      # HFT settings
      order_timeout_seconds: 5
      max_position_hold_seconds: 60
      min_signal_interval_ms: 5000  # 5 seconds - prevent order spam

    # -------------------------------------------------------------------------
    # Pair Trading: Long strongest / Short weakest
    # -------------------------------------------------------------------------
    pair_trading:
      enabled: true
      symbols: [BTC, ETH, SOL]
      allocation_pct: 0.30
      max_positions: 4  # 2 pairs x 2 legs
      signal_cooldown_seconds: 5

      # Pairs to trade
      pairs:
        - [BTC, ETH]
        - [ETH, SOL]

      # Correlation/spread parameters
      lookback_seconds: 300  # 5 min
      zscore_entry_threshold: 2.0
      zscore_exit_threshold: 0.5
      rebalance_interval_seconds: 60

      # Risk/Reward
      take_profit_spread_pct: 0.002  # 0.2%
      stop_loss_spread_pct: 0.003  # 0.3%

      # Leverage (per leg)
      default_leverage: 15.0
      max_leverage: 20.0

      # Position sizing (per leg)
      max_position_pct: 0.015  # 1.5% per leg

      # HFT settings
      order_timeout_seconds: 5
      max_position_hold_seconds: 300  # 5 min max hold
      min_signal_interval_ms: 10000  # 10 seconds - pair trading is slower

    # -------------------------------------------------------------------------
    # Liquidation Sniping: Trade liquidation cascades
    # -------------------------------------------------------------------------
    liquidation_sniping:
      enabled: true
      symbols: [BTC, ETH]
      allocation_pct: 0.15
      max_positions: 2
      signal_cooldown_seconds: 2

      # Detection parameters
      oi_spike_threshold_pct: 0.02  # 2% OI change
      oi_spike_window_seconds: 60
      price_spike_threshold_pct: 0.005  # 0.5% price move

      # Entry timing
      entry_delay_ms: 100

      # Risk/Reward
      take_profit_pct: 0.003  # 0.3%
      stop_loss_pct: 0.002  # 0.2%

      # Leverage (aggressive)
      default_leverage: 20.0
      max_leverage: 25.0

      # Position sizing
      max_position_pct: 0.01  # 1% per trade

      # HFT settings
      order_timeout_seconds: 5
      max_position_hold_seconds: 30  # Very short hold
      min_signal_interval_ms: 5000  # 5 seconds - prevent order spam

# =============================================================================
# TELEGRAM ALERTING
# =============================================================================
telegram:
  enabled: false  # Set to true and add tokens in .env
  alert_on_trade: true
  alert_on_error: true
  alert_on_daily_summary: true
  alert_on_circuit_breaker: true

# =============================================================================
# AI LAYER (Aggression Controller) - Using DeepSeek V3.2-Speciale
# =============================================================================
openai:
  enabled: true
  model: deepseek-reasoner
  base_url: https://api.deepseek.com/v3.2_speciale_expires_on_20251215
  regime_detection_interval_minutes: 5  # More frequent for HFT
  param_tuning_interval_hours: 6  # More frequent tuning
  max_tokens: 4000
  temperature: 0.3
