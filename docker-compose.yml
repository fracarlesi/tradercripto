services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: password
      POSTGRES_DB: trader_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader -d trader_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://trader:password@postgres:5432/trader_db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  dashboard:
    build: ./frontend
    environment:
      - DATABASE_URL=postgresql://trader:password@postgres:5432/trader_db
    ports:
      - "5611:5611"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
