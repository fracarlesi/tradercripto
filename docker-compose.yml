services:
  crypto_bot:
    build: .
    container_name: hlquantbot_crypto
    command: ["python", "-m", "crypto_bot.main"]
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./data:/app/data
      - hlquantbot_data:/root/.hlquantbot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  crypto_bot_paper:
    build: .
    container_name: hlquantbot_paper
    command: ["python", "-m", "crypto_bot.main", "-c", "crypto_bot/config/trading_paper.yaml"]
    env_file:
      - .env.paper
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - hlquantbot_paper_data:/root/.hlquantbot_paper
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    profiles:
      - paper

  ib_bot:
    build:
      context: .
      dockerfile: Dockerfile.ib_bot
    container_name: hlquantbot_ib
    command: ["python", "-m", "ib_bot.main"]
    env_file:
      - .env
    volumes:
      - ./ib_bot/logs:/app/ib_bot/logs
    network_mode: host    # Required to reach TWS on localhost
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    profiles:
      - ib    # Only start with: docker compose --profile ib up

volumes:
  hlquantbot_data:
  hlquantbot_paper_data:
