services:
  crypto_bot:
    build: .
    container_name: hlquantbot_crypto
    command: ["python", "-m", "crypto_bot.main"]
    stop_grace_period: 30s
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - ./data:/app/data
      # trade_logs isolated from ./data bind mount: lives on a host path
      # outside /opt/hlquantbot/ so deploy rsync can never touch it.
      - hlquantbot_trade_logs:/app/data/trade_logs
      - hlquantbot_data:/root/.hlquantbot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  crypto_bot_paper:
    build: .
    container_name: hlquantbot_paper
    command: ["python", "-m", "crypto_bot.main", "-c", "crypto_bot/config/trading_paper.yaml"]
    env_file:
      - .env.paper
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
      - hlquantbot_paper_data:/root/.hlquantbot_paper
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    profiles:
      - paper

  ib_gateway:
    image: ghcr.io/gnzsnz/ib-gateway:10.37
    container_name: ib_gateway
    environment:
      TWS_USERID: ${IB_USERNAME}
      TWS_PASSWORD: ${IB_PASSWORD}
      TRADING_MODE: paper
      READ_ONLY_API: "no"
      RELOGIN_AFTER_2FA_TIMEOUT: "yes"
      EXISTING_SESSION_DETECTED_ACTION: primaryoverride
      TWOFA_TIMEOUT_ACTION: restart
      ACCEPT_NON_BROKERAGE_ACCOUNT_WARNING: "yes"
      AUTO_RESTART_TIME: "11:58 PM"
    ports:
      - "4002:4004"   # Paper trading API port
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    profiles:
      - ib

  ib_bot:
    build:
      context: .
      dockerfile: Dockerfile.ib_bot
    container_name: hlquantbot_ib
    command: ["python", "-m", "ib_bot.main"]
    env_file:
      - .env
    volumes:
      - ./ib_bot/logs:/app/ib_bot/logs
      - ./ib_bot/data:/app/data
    network_mode: host    # Required to reach ib_gateway on localhost:4002
    depends_on:
      - ib_gateway
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    profiles:
      - ib    # Only start with: docker compose --profile ib up

  frontend:
    build:
      context: .
      dockerfile: crypto_bot/frontend/Dockerfile
    container_name: hlquantbot_frontend
    depends_on:
      - crypto_bot
    environment:
      HLQUANTBOT_DATA_DIR: /data
    volumes:
      # Read-only mount of the trade_logs volume — frontend never writes.
      - hlquantbot_trade_logs:/data/trade_logs:ro
    ports:
      - "127.0.0.1:5611:5611"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  hlquantbot_data:
  hlquantbot_paper_data:
  # Persistent trade decision/outcome logs for FLAG-Trader RAG memory.
  # Bound to a host path OUTSIDE /opt/hlquantbot/ so deploy rsync --delete
  # can never wipe it. Populated via: mkdir -p /opt/hlquantbot_trade_logs
  # and copying existing data before first docker compose up.
  hlquantbot_trade_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/hlquantbot_trade_logs
